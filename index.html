<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOVA - spots</title>
    <link rel="manifest" href="../../manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="../../images/appicon.JPG" />

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/geofire-common@6.0.0/dist/geofire-common/geofire-common.min.js"></script>
    <style>
      :root {
        --bg: transparent;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b7108;
        --panel: rgba(10, 10, 10, 0.94);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        --radius: 18px;
        --success: rgba(163, 214, 158, 0.95);
        --danger: rgba(255, 160, 160, 0.95);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #161515;
        color: var(--fg);
        height: 100dvh;
        overflow: hidden;
      }

      nav {
        width: 100%;
        padding: 22px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        background: var(--bg);
        z-index: 20;
        pointer-events: none;
      }

      nav > * {
        pointer-events: auto;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .nav-left img {
        height: 50px;
        width: auto;
        display: block;
      }

      .beta {
        padding: 2px 6px;
        font-size: 0.85rem;
        background-color: var(--accent);
        color: white;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .nav-right {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        min-width: 0;
      }

      .hamburger-toggle {
        width: 44px;
        height: 44px;
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.2);
        color: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        padding: 0;
        margin: 0;
        font-family: inherit;
        appearance: none;
        -webkit-appearance: none;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.24);
        transition:
          transform 0.2s ease,
          background 0.2s ease,
          border-color 0.2s ease,
          color 0.2s ease,
          box-shadow 0.2s ease;
      }

      .hamburger-toggle span {
        width: 17px;
        height: 2px;
        display: block;
        border-radius: 999px;
        background: currentColor;
        transition:
          transform 0.22s ease,
          opacity 0.18s ease,
          width 0.2s ease;
      }

      .hamburger-toggle:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(139, 113, 8, 0.72);
        color: var(--accent);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.32);
      }

      .hamburger-toggle:focus-visible {
        outline: 2px solid rgba(139, 113, 8, 0.9);
        outline-offset: 4px;
      }

      .nav-right.open .hamburger-toggle span:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
      }

      .nav-right.open .hamburger-toggle span:nth-child(2) {
        opacity: 0;
        width: 8px;
      }

      .nav-right.open .hamburger-toggle span:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
      }

      .hamburger-menu {
        position: absolute;
        top: 54px;
        right: 0;
        width: min(230px, calc(100vw - 28px));
        padding: 9px;
        display: grid;
        gap: 5px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 18px;
        background: rgba(8, 8, 8, 0.58);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.45);
        opacity: 0;
        transform: translateY(-8px) scale(0.96);
        transform-origin: top right;
        pointer-events: none;
        transition:
          opacity 0.18s ease,
          transform 0.18s ease,
          background 0.18s ease;
      }

      .nav-right.open .hamburger-menu {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      .hamburger-menu a,
      .hamburger-menu button {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        text-decoration: none;
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.94rem;
        font-weight: 520;
        line-height: 1.2;
        letter-spacing: 0.15px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 13px;
        cursor: pointer;
        padding: 12px 13px;
        margin: 0;
        font-family: inherit;
        white-space: nowrap;
        appearance: none;
        -webkit-appearance: none;
        transition:
          transform 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease,
          color 0.18s ease;
      }

      .hamburger-menu a::after,
      .hamburger-menu button::after {
        content: "→";
        color: var(--accent);
        opacity: 0;
        transform: translateX(-5px);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .hamburger-menu a:hover,
      .hamburger-menu button:hover {
        color: #fff;
        background: rgba(139, 113, 8, 0.18);
        border-color: rgba(139, 113, 8, 0.28);
        transform: translateX(2px);
      }

      .hamburger-menu a:hover::after,
      .hamburger-menu button:hover::after {
        opacity: 0.9;
        transform: translateX(0);
      }

      .hamburger-menu a:focus-visible,
      .hamburger-menu button:focus-visible {
        outline: 2px solid rgba(139, 113, 8, 0.9);
        outline-offset: 2px;
      }

      .kova-tutorial {
        position: fixed;
        inset: 0;
        z-index: 10000;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(0, 0, 0, 0.52);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.22s ease;
      }

      .kova-tutorial.open {
        opacity: 1;
        pointer-events: auto;
      }

      .tutorial-card {
        width: min(520px, calc(100vw - 28px));
        min-height: 560px;
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: #101010;
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.58);
        transform: translateY(12px) scale(0.985);
        transition: transform 0.24s ease;
      }

      .kova-tutorial.open .tutorial-card {
        transform: translateY(0) scale(1);
      }

      .tutorial-close {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 3;
        width: 36px;
        height: 36px;
        display: inline-grid;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: #191919;
        color: rgba(255, 255, 255, 0.76);
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        transition:
          color 0.18s ease,
          background 0.18s ease,
          border-color 0.18s ease,
          transform 0.18s ease;
      }

      .tutorial-close:hover {
        color: #fff;
        background: #222;
        border-color: rgba(139, 113, 8, 0.5);
        transform: scale(1.03);
      }

      .tutorial-content {
        display: flex;
        flex: 1;
        flex-direction: column;
        padding: 34px;
      }

      .tutorial-kicker {
        width: max-content;
        margin-bottom: 22px;
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 760;
        letter-spacing: 1.9px;
        text-transform: uppercase;
      }

      .tutorial-visual {
        height: 190px;
        position: relative;
        display: grid;
        place-items: center;
        margin-bottom: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 22px;
        background: #171717;
        overflow: hidden;
      }

      .tutorial-map-lines {
        position: absolute;
        inset: 18px;
        opacity: 0.2;
        background:
          linear-gradient(
            90deg,
            transparent 0 48%,
            rgba(255, 255, 255, 0.34) 49% 50%,
            transparent 51% 100%
          ),
          linear-gradient(
            0deg,
            transparent 0 48%,
            rgba(255, 255, 255, 0.28) 49% 50%,
            transparent 51% 100%
          );
        background-size: 54px 54px;
      }

      .tutorial-orb {
        width: 88px;
        height: 88px;
        position: relative;
        display: grid;
        place-items: center;
        border: 1px solid rgba(139, 113, 8, 0.48);
        border-radius: 24px;
        background: rgba(139, 113, 8, 0.14);
        color: var(--accent);
        font-size: 2.7rem;
        font-weight: 850;
        letter-spacing: -1px;
      }

      .tutorial-title {
        margin: 0 0 12px 0;
        color: #fff;
        font-size: clamp(2.25rem, 8vw, 3.25rem);
        line-height: 0.96;
        letter-spacing: -2px;
      }

      .tutorial-text {
        min-height: 92px;
        margin: 0;
        color: rgba(255, 255, 255, 0.68);
        font-size: 1.02rem;
        line-height: 1.58;
      }

      .tutorial-text b {
        color: var(--accent);
        font-weight: 700;
      }

      .tutorial-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-top: auto;
        padding-top: 28px;
      }

      .tutorial-dots {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tutorial-dot {
        width: 7px;
        height: 7px;
        display: block;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.28);
        transition:
          width 0.2s ease,
          background 0.2s ease;
      }

      .tutorial-dot.active {
        width: 25px;
        background: var(--accent);
      }

      .tutorial-actions {
        display: flex;
        align-items: center;
        gap: 9px;
      }

      .tutorial-btn {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: #181818;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        font-family: inherit;
        font-size: 0.92rem;
        font-weight: 650;
        min-height: 44px;
        padding: 0 17px;
        transition:
          background 0.18s ease,
          border-color 0.18s ease,
          color 0.18s ease,
          transform 0.18s ease;
      }

      .tutorial-btn:hover {
        color: #fff;
        background: #222;
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .tutorial-btn.primary {
        min-width: 96px;
        border-color: rgba(139, 113, 8, 0.92);
        background: var(--accent);
        color: #fff;
      }

      .tutorial-btn.primary:hover {
        background: #9a7d09;
      }

      .tutorial-btn:disabled {
        opacity: 0.34;
        pointer-events: none;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        z-index: 0;
      }

      #map,
      #map canvas {
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }

      .pinpoint {
        position: relative;
        width: 24px;
        height: 24px;
        transform: translate(-50%, -50%);
        pointer-events: none;
        border-radius: 999px;
        background: radial-gradient(
          circle at 35% 35%,
          #fff7cf 0%,
          #d6b13e 24%,
          #8b7108 68%,
          #5b4700 100%
        );
        border: 2px solid rgba(255, 255, 255, 0.95);
        box-shadow:
          0 10px 22px rgba(0, 0, 0, 0.42),
          0 0 0 6px rgba(139, 113, 8, 0.12);
        user-select: none;
        -webkit-user-select: none;
      }

      .pinpoint::before {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: inherit;
        border: 1px solid rgba(139, 113, 8, 0.4);
        opacity: 0.95;
      }

      .pinpoint::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 46px;
        height: 46px;
        border-radius: 999px;
        border: 1px solid rgba(214, 177, 62, 0.35);
        transform: translate(-50%, -50%);
        animation: kovaPinPulse 1.7s ease-out infinite;
      }

      @keyframes kovaPinPulse {
        0% {
          transform: translate(-50%, -50%) scale(0.72);
          opacity: 0.95;
        }
        100% {
          transform: translate(-50%, -50%) scale(1.24);
          opacity: 0;
        }
      }

      .maplibregl-popup-content {
        background: transparent !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      .maplibregl-popup-tip {
        display: none !important;
      }

      .maplibregl-popup-close-button {
        color: rgba(255, 255, 255, 0.7) !important;
        background: transparent !important;
        font-size: 18px;
        padding: 10px 12px !important;
        z-index: 40;
      }

      footer {
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      footer.footer-hidden {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .join-page {
        color: var(--fg);
        position: absolute;
        bottom: 0%;
        right: 0%;
        padding-bottom: 17px;
        padding-right: 15px;
        z-index: 30;
      }

      .kova-corp {
        position: absolute;
        bottom: 0%;
        padding-left: 15px;
        z-index: 30;
      }

      .kova-popup {
        width: min(600px, calc(100vw - 28px));
        max-height: min(72vh, 760px);
        background: linear-gradient(180deg, var(--panel), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        transform: translateY(0);
        transition: transform 0.24s ease;
      }

      .sheet-grabber {
        display: none;
      }

      .kova-popup .hero {
        position: relative;
        height: clamp(190px, 24vw, 260px);
        background: #111;
        overflow: hidden;
        flex-shrink: 0;
      }

      .kova-popup .body {
        padding: 16px;
        background: linear-gradient(
          180deg,
          rgba(18, 18, 18, 0.92),
          rgba(0, 0, 0, 0.94)
        );
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .kova-popup .hero img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.05) contrast(1.05);
        transform: scale(1.01);
        opacity: 0;
        transition: opacity 0.28s ease;
      }

      .kova-popup .hero.is-loaded img {
        opacity: 1;
      }

      .kova-popup .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.25) 55%,
          rgba(0, 0, 0, 0.78) 100%
        );
        pointer-events: none;
        z-index: 2;
      }

      .kova-popup .badge {
        position: absolute;
        left: 14px;
        top: 14px;
        padding: 7px 10px;
        font-size: 0.78rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        z-index: 3;
      }

      .kova-popup .title {
        font-size: clamp(1.06rem, 1.2vw, 1.25rem);
        font-weight: 650;
        line-height: 1.2;
        margin: 0 0 8px 0;
        letter-spacing: 0.2px;
        word-break: break-word;
      }

      .kova-popup .desc {
        margin: 0 0 10px 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.96rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .kova-popup .byline {
        margin: 0 0 14px 0;
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.2px;
        word-break: break-word;
      }

      .kova-popup .byline b {
        color: rgba(255, 255, 255, 0.9);
        font-weight: 650;
      }

      .kova-btn {
        appearance: none;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 650;
        letter-spacing: 0.2px;
        transition:
          transform 0.12s ease,
          background 0.2s ease,
          border-color 0.2s ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        min-height: 46px;
      }

      .kova-btn:hover {
        background: rgba(255, 255, 255, 0.085);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .kova-btn.primary {
        background: rgba(139, 113, 8, 0.95);
        border-color: rgba(139, 113, 8, 0.95);
        color: #fff;
      }

      .kova-btn.primary:hover {
        background: rgba(139, 113, 8, 1);
      }

      .kova-btn .sub {
        display: block;
        font-weight: 500;
        font-size: 0.78rem;
        opacity: 0.9;
        margin-top: 2px;
      }

      .kova-fallback,
      .kova-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at 30% 20%,
            rgba(139, 113, 8, 0.25),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 80%,
            rgba(255, 255, 255, 0.08),
            transparent 50%
          ),
          #0b0b0b;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .kova-loading {
        z-index: 1;
        flex-direction: column;
        gap: 10px;
      }

      .kova-loading.hidden,
      .kova-fallback.hidden {
        display: none;
      }

      .kova-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.18);
        border-top-color: rgba(255, 255, 255, 0.88);
        animation: spin 0.8s linear infinite;
      }

      .kova-loading-text {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.78);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .coord-popup {
        width: min(360px, calc(100vw - 24px));
        padding: 14px;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        background: linear-gradient(
          180deg,
          rgba(16, 16, 16, 0.98),
          rgba(8, 8, 8, 0.96)
        );
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.5);
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
      }

      .coord-popup strong {
        display: block;
        margin: 0;
        font-size: 1.02rem;
        line-height: 1.2;
        letter-spacing: 0.1px;
      }

      .coord-popup .coords {
        display: block;
        margin: 10px 0 0 0;
        color: rgba(255, 255, 255, 0.76);
        font-size: 0.92rem;
        line-height: 1.45;
        word-break: break-word;
      }

      .coord-popup .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .coord-popup .btn-row.single {
        grid-template-columns: 1fr;
      }

      .coord-popup button {
        width: 100%;
        min-height: 46px;
        padding: 12px 13px;
        background: rgba(255, 255, 255, 0.06);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 13px;
        cursor: pointer;
        font-weight: 700;
        font-family: inherit;
        font-size: 0.92rem;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        transition:
          transform 0.14s ease,
          background 0.18s ease,
          border-color 0.18s ease;
      }

      .coord-popup button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.16);
      }

      .coord-popup button.primary {
        background: linear-gradient(
          180deg,
          rgba(155, 126, 11, 1),
          rgba(139, 113, 8, 1)
        );
        border-color: rgba(139, 113, 8, 1);

        function attachMobileSheetGestures(popup) {
          requestAnimationFrame(() => {
            if (!popup) return;

            const popupEl = popup.getElement();
            if (!popupEl) return;

            const card = popupEl.querySelector(".kova-popup[data-spot-id]");
            if (!card) return;

            setSpotSheetState(card, "expanded");
            if (card.dataset.sheetBound === "true") return;
            card.dataset.sheetBound = "true";

            const dragZones = [
              card.querySelector("[data-sheet-grabber]"),
              card.querySelector(".hero"),
            ].filter(Boolean);

            let startY = 0;
            let lastY = 0;
            let dragging = false;

            function startDrag(event) {
              if (!isMobileSpotSheet()) return;
              if (event.pointerType && event.pointerType === "mouse") return;
              if (event.isPrimary === false) return;

              dragging = true;
              startY = event.clientY;
              lastY = event.clientY;
              card.classList.add("sheet-dragging");

              try {
                event.currentTarget.setPointerCapture(event.pointerId);
              } catch (e) {}
            }

            function moveDrag(event) {
              if (!dragging) return;
              lastY = event.clientY;

              const dy = lastY - startY;
              const down = Math.max(0, dy);
              const up = Math.min(0, dy);
              const translateY =
                down > 0 ? Math.min(down, 220) : Math.max(up * 0.16, -18);

              card.style.transform = `translateY(${translateY}px)`;
            }

            function endDrag() {
              if (!dragging) return;

              const dy = lastY - startY;
              dragging = false;
              card.classList.remove("sheet-dragging");
              card.style.transform = "";

              if (dy < -42) {
                setSpotSheetState(card, "expanded");
                return;
              }

              if (dy > 72) {
                closeActiveSpotPopup({ animate: true });
                return;
              }

              setSpotSheetState(card, "expanded");
            }

            dragZones.forEach((zone) => {
              zone.addEventListener("pointerdown", startDrag, {
                passive: true,
              });
              zone.addEventListener("pointermove", moveDrag, { passive: true });
              zone.addEventListener("pointerup", endDrag, { passive: true });
              zone.addEventListener("pointercancel", endDrag, {
                passive: true,
              });
            });
          });
        }

        function haversineMeters(aLat, aLng, bLat, bLng) {
          const R = 6371000;
          const dLat = toRad(bLat - aLat);
          const dLng = toRad(bLng - aLng);

          const s1 =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(aLat)) *
              Math.cos(toRad(bLat)) *
              Math.sin(dLng / 2) *
              Math.sin(dLng / 2);

          const c = 2 * Math.atan2(Math.sqrt(s1), Math.sqrt(1 - s1));
          return R * c;
        }

          return {
            minLat: lat - latDelta,
            maxLat: lat + latDelta,
            minLng: lng - lngDelta,
            maxLng: lng + lngDelta,
          };
        }

        async function rateSpot(spotId, newRating) {
          if (!Number.isInteger(newRating) || newRating < 1 || newRating > 5) {
            throw new Error("Invalid rating.");
          }

          const previousRating = getLocalRating(spotId);
          if (previousRating) {
            throw new Error("This spot has already been rated on this device.");
          }

          const spotRef = db.collection("spots").doc(spotId);

          await db.runTransaction(async (transaction) => {
            const spotSnap = await transaction.get(spotRef);

            if (!spotSnap.exists) {
              throw new Error("Spot not found.");
            }

            const spotData = spotSnap.data() || {};
            let ratingSum = Number(spotData.ratingSum || 0);
            let ratingCount = Number(spotData.ratingCount || 0);

            ratingSum += newRating;
            ratingCount += 1;

            if (ratingCount < 0) ratingCount = 0;
            if (ratingSum < 0) ratingSum = 0;

            const avgRating = ratingCount > 0 ? ratingSum / ratingCount : 0;

            transaction.set(
              spotRef,
              {
                ratingSum: Math.round(ratingSum),
                ratingCount: Math.round(ratingCount),
                avgRating: Number(avgRating.toFixed(2)),
              },
              { merge: true },
            );
          });

          setLocalRating(spotId, newRating);
        }

            const localRating = getLocalRating(spotId);
            const avgRating = Number(spotData.avgRating || 0);
            const ratingCount = Number(spotData.ratingCount || 0);
            const alreadyRated = localRating !== null;

            if (ratingSummaryEl) {
              ratingSummaryEl.innerHTML = `
                ${renderStars(avgRating)} ${avgRating.toFixed(1)}
                <small>(${ratingCount} ratings)</small>
              `;
            }

            renderInteractiveStars(starsRowEl, localRating || 0, alreadyRated);

            if (ratingNoteEl) {
              ratingNoteEl.textContent = alreadyRated
                ? `You already rated this spot on this device: ${localRating}/5`
                : "Tap a star to rate this spot.";
            }

            setStatus(ratingStatusEl, "");
          } catch (err) {
            console.error("Popup hydrate error:", err);
            setStatus(ratingStatusEl, "Could not load rating data.", "error");
          }

          if (starsRowEl && !starsRowEl.dataset.bound) {
            starsRowEl.dataset.bound = "true";

            starsRowEl.addEventListener("click", async (e) => {
              const btn = e.target.closest("[data-rate-value]");
              if (!btn) return;

              const spotCard = popupEl.querySelector(
                ".kova-popup[data-spot-id]",
              );
              const liveSpotId = spotCard?.getAttribute("data-spot-id");
              const value = Number(btn.getAttribute("data-rate-value"));

              if (!liveSpotId || !Number.isInteger(value)) return;

              const ratingStatusElLocal = popupEl.querySelector(
                "[data-rating-status]",
              );
              const ratingNoteElLocal =
                popupEl.querySelector("[data-rating-note]");

              if (getLocalRating(liveSpotId) !== null) {
                setStatus(
                  ratingStatusElLocal,
                  "You already rated this spot on this device.",
                  "error",
                );
                return;
              }

              try {
                setStatus(ratingStatusElLocal, "Saving rating...");
                await rateSpot(liveSpotId, value);
                setStatus(ratingStatusElLocal, "Rating saved.", "success");

                if (ratingNoteElLocal) {
                  ratingNoteElLocal.textContent = `You already rated this spot on this device: ${value}/5`;
                }

                await hydratePopupData(popup, { id: liveSpotId });
              } catch (err) {
                console.error("Rating error:", err);
                setStatus(
                  ratingStatusElLocal,
                  err?.message || "Could not save rating.",
                  "error",
                );
              }
            });
          }
        }

        async function findNearbyExistingSpot(
          lat,
          lng,
          radiusM = DUPLICATE_BLOCK_RADIUS_M,
        ) {
          const docsById = new Map();
          const radiusKm = radiusM / 1000;
          const canGeoHash =
            window.geofire &&
            typeof window.geofire.geohashQueryBounds === "function";

          try {
            if (canGeoHash) {
              const bounds = window.geofire.geohashQueryBounds(
                [lat, lng],
                radiusM,
              );

              await Promise.all(
                bounds.map(async (bound) => {
                  const q = db
                    .collection("spots")
                    .orderBy("geohash")
                    .startAt(bound[0])
                    .endAt(bound[1]);

                  const snap = await q.get();
                  snap.forEach((doc) => {
                    docsById.set(doc.id, { id: doc.id, ...doc.data() });
                  });
                }),
              );
            } else {
              const box = getBoundsForRadius(lat, lng, radiusKm);
              const q = db
                .collection("spots")
                .where("lat", ">=", box.minLat)
                .where("lat", "<=", box.maxLat);

              const snap = await q.get();
              snap.forEach((doc) => {
                const d = doc.data();
                if (
                  d &&
                  typeof d.lng === "number" &&
                  d.lng >= box.minLng &&
                  d.lng <= box.maxLng
                ) {
                  docsById.set(doc.id, { id: doc.id, ...d });
                }
              });
            }
          } catch (err) {
            console.error("Duplicate check error:", err);
            return null;
          }

          let nearest = null;

          docsById.forEach((spot) => {
            if (
              !spot ||
              typeof spot.lat !== "number" ||
              typeof spot.lng !== "number"
            ) {
              return;
            }

            const distance = haversineMeters(lat, lng, spot.lat, spot.lng);

            if (distance <= radiusM) {
              if (!nearest || distance < nearest.distance) {
                nearest = { ...spot, distance };
              }
            }
          });

          return nearest;
        }

        async function fetchSpotsInRadius(
          centerLat,
          centerLng,
          radiusKm = SEARCH_RADIUS_KM,
          options = {},
        ) {
          const {
            recenter = true,
            showEmptyPopup = true,
            noSpotsAutoCloseAt = 0,
          } = options;
          const radiusM = radiusKm * 1000;
          const docsById = new Map();
          const canGeoHash =
            window.geofire &&
            typeof window.geofire.geohashQueryBounds === "function";

          try {
            if (canGeoHash) {
              const bounds = window.geofire.geohashQueryBounds(
                [centerLat, centerLng],
                radiusM,
              );

              await Promise.all(
                bounds.map(async (bound) => {
                  const q = db
                    .collection("spots")
                    .orderBy("geohash")
                    .startAt(bound[0])
                    .endAt(bound[1]);

                  const snap = await q.get();
                  snap.forEach((doc) => {
                    docsById.set(doc.id, doc.data());
                  });
                }),
              );
            } else {
              const box = getBoundsForRadius(centerLat, centerLng, radiusKm);
              const q = db
                .collection("spots")
                .where("lat", ">=", box.minLat)
                .where("lat", "<=", box.maxLat);

              const snap = await q.get();
              snap.forEach((doc) => {
                const d = doc.data();
                if (
                  d &&
                  typeof d.lng === "number" &&
                  d.lng >= box.minLng &&
                  d.lng <= box.maxLng
                ) {
                  docsById.set(doc.id, d);
                }
              });
            }
          } catch (err) {
            console.error("Radius fetch error:", err);
            return;
          }

          const features = [];

          docsById.forEach((spot, id) => {
            if (
              !spot ||
              typeof spot.lat !== "number" ||
              typeof spot.lng !== "number"
            ) {
              return;
            }

            const distance = haversineMeters(
              centerLat,
              centerLng,
              spot.lat,
              spot.lng,
            );

            if (distance > radiusM) return;

            features.push({
              type: "Feature",
              geometry: {
                type: "Point",
                coordinates: [spot.lng, spot.lat],
              },
              properties: {
                id,
                name: spot.name || "",
                description: spot.description || "",
                addedBy: spot.addedBy || "",
                added_by: spot.added_by || "",
                author: spot.author || "",
                photoURL: spot.photoURL || "",
                lat: spot.lat,
                lng: spot.lng,
                avgRating: Number(spot.avgRating || 0),
                ratingCount: Number(spot.ratingCount || 0),
              },
            });
          });

          setSpotsGeoJSON(features);

          if (features.length === 0) {
            if (showEmptyPopup) {
              const autoCloseDelayMs = noSpotsAutoCloseAt
                ? Math.max(1, noSpotsAutoCloseAt - Date.now())
                : 0;
              showNoSpotsPopup(
                centerLat,
                centerLng,
                radiusKm,
                autoCloseDelayMs,
              );
            }
            return;
          }

          closeCoordPopup();

          if (recenter) {
            map.easeTo({
              center: [centerLng, centerLat],
              zoom: Math.max(map.getZoom(), 11),
              duration: 500,
            });
          }
        }

        async function zoomToClusterSpots(clusterId, fallbackCoords) {
          const src = map.getSource(SOURCE_ID);
          if (!src) return;

          try {
            const leaves = await src.getClusterLeaves(
              Number(clusterId),
              100,
              0,
            );

            if (Array.isArray(leaves) && leaves.length > 1) {
              const bounds = new maptilersdk.LngLatBounds();

              leaves.forEach((leaf) => {
                const coords = leaf?.geometry?.coordinates;
                if (
                  Array.isArray(coords) &&
                  typeof coords[0] === "number" &&
                  typeof coords[1] === "number"
                ) {
                  bounds.extend(coords);
                }
              });

              if (!bounds.isEmpty()) {
                map.fitBounds(bounds, {
                  padding: { top: 90, bottom: 90, left: 90, right: 90 },
                  maxZoom: 15,
                  duration: 650,
                });
                return;
              }
            }

            if (Array.isArray(leaves) && leaves.length === 1) {
              const onlyCoords = leaves[0]?.geometry?.coordinates;
              if (Array.isArray(onlyCoords)) {
                map.easeTo({
                  center: onlyCoords,
                  zoom: Math.max(map.getZoom(), 14),
                  duration: 520,
                });
                return;
              }
            }

            const zoom = await src.getClusterExpansionZoom(Number(clusterId));
            map.easeTo({
              center: fallbackCoords,
              zoom,
              duration: 520,
            });
          } catch (err) {
            console.error("Cluster zoom error:", err);

            try {
              const zoom = await src.getClusterExpansionZoom(Number(clusterId));
              map.easeTo({
                center: fallbackCoords,
                zoom,
                duration: 520,
              });
            } catch (fallbackErr) {
              console.error("Cluster fallback zoom error:", fallbackErr);
            }
          }
        }

        function needsLongPressForMapSearch() {

            target &&

          if (!mapLoaded || !map.getLayer(LAYER_POINTS)) return [];

          if (hits && hits.length) return;

          window.setTimeout(() => {
            if (!longPressIndicator) return;
            longPressIndicator.classList.remove("show", "ready");
          }, 260);
        }

        function hideLongPressIndicator() {
          if (!longPressIndicator) return;
          longPressIndicator.classList.remove("show", "ready");
        }

        let searchRadiusAnimationFrame = null;
        let searchRadiusHideTimer = null;

        function ensureSearchRadiusPulse() {
          if (!mapLoaded) return null;

          if (!map.getSource(SEARCH_RADIUS_SOURCE_ID)) {
            map.addSource(SEARCH_RADIUS_SOURCE_ID, {
              type: "geojson",
              data: emptyGeoJSON(),
            });
          }

          if (!map.getLayer(SEARCH_RADIUS_FILL_LAYER)) {
            map.addLayer(
              {
                id: SEARCH_RADIUS_FILL_LAYER,
                type: "fill",
                source: SEARCH_RADIUS_SOURCE_ID,
                paint: {
                  "fill-color": "rgba(139, 113, 8, 1)",
                  "fill-opacity": 0.11,
                },
              },
              map.getLayer(LAYER_CLUSTERS_X) ? LAYER_CLUSTERS_X : undefined,
            );
          }

          if (!map.getLayer(SEARCH_RADIUS_LINE_LAYER)) {
            map.addLayer(
              {
                id: SEARCH_RADIUS_LINE_LAYER,
                type: "line",
                source: SEARCH_RADIUS_SOURCE_ID,
                paint: {
                  "line-color": "rgba(214, 177, 62, 0.95)",
                  "line-width": 1.5,
                  "line-opacity": 0.72,
                },
              },
              map.getLayer(LAYER_CLUSTERS_X) ? LAYER_CLUSTERS_X : undefined,
            );
          }

          return map.getSource(SEARCH_RADIUS_SOURCE_ID);
        }

        function makeRadiusCircleGeoJSON(
          centerLng,
          centerLat,
          radiusKm,
          steps = 128,
        ) {
          if (!Number.isFinite(centerLng) || !Number.isFinite(centerLat)) {
            return emptyGeoJSON();
          }

          const earthRadiusKm = 6371.0088;
          const angularDistance = radiusKm / earthRadiusKm;
          const lat1 = toRad(centerLat);
          const lng1 = toRad(centerLng);
          const coords = [];

          for (let i = 0; i <= steps; i++) {
            const bearing = (2 * Math.PI * i) / steps;
            const lat2 = Math.asin(
              Math.sin(lat1) * Math.cos(angularDistance) +
                Math.cos(lat1) * Math.sin(angularDistance) * Math.cos(bearing),
            );
            const lng2 =
              lng1 +
              Math.atan2(
                Math.sin(bearing) * Math.sin(angularDistance) * Math.cos(lat1),
                Math.cos(angularDistance) - Math.sin(lat1) * Math.sin(lat2),
              );

            coords.push([(lng2 * 180) / Math.PI, (lat2 * 180) / Math.PI]);
          }

          return {
            type: "FeatureCollection",
            features: [
              {
                type: "Feature",
                geometry: {
                  type: "Polygon",
                  coordinates: [coords],
                },
                properties: {},
              },
            ],
          };
        }

        function easeOutCubic(t) {
          return 1 - Math.pow(1 - t, 3);
        }

        function showSearchRadiusPulse(lng, lat, radiusKm = SEARCH_RADIUS_KM) {
          const src = ensureSearchRadiusPulse();
          if (!src) return;

          if (searchRadiusAnimationFrame) {
            window.cancelAnimationFrame(searchRadiusAnimationFrame);
            searchRadiusAnimationFrame = null;
          }

          if (searchRadiusHideTimer) {
            window.clearTimeout(searchRadiusHideTimer);
            searchRadiusHideTimer = null;
          }

          const targetRadiusKm = Number(radiusKm) || SEARCH_RADIUS_KM;
          const duration = 560;
          const start = performance.now();

          function frame(now) {
            const progress = Math.min(1, (now - start) / duration);
            const animatedRadiusKm = Math.max(
              0.08,
              targetRadiusKm * easeOutCubic(progress),
            );
            src.setData(makeRadiusCircleGeoJSON(lng, lat, animatedRadiusKm));

            if (progress < 1) {
              searchRadiusAnimationFrame = window.requestAnimationFrame(frame);
              return;
            }

            src.setData(makeRadiusCircleGeoJSON(lng, lat, targetRadiusKm));
            searchRadiusAnimationFrame = null;
            searchRadiusHideTimer = window.setTimeout(() => {
              const liveSource = map.getSource(SEARCH_RADIUS_SOURCE_ID);
              if (liveSource) liveSource.setData(emptyGeoJSON());
            }, 420);
          }

          src.setData(makeRadiusCircleGeoJSON(lng, lat, 0.08));
          searchRadiusAnimationFrame = window.requestAnimationFrame(frame);
        }

        function clearLongPressTimer() {
          if (longPressTimer) {
            window.clearTimeout(longPressTimer);
            longPressTimer = null;
          }

          if (longPressVisualTimer) {
            window.clearTimeout(longPressVisualTimer);
            longPressVisualTimer = null;
          }

          longPressPointer = null;
          hideLongPressIndicator();
        }

        function getPointFromClient(clientX, clientY) {
          const rect = mapCanvas.getBoundingClientRect();
          return {
            x: clientX - rect.left,
            y: clientY - rect.top,
          };
        }

        function pointIsInsideMap(point) {
          if (!point) return false;
          return (
            point.x >= 0 &&
            point.y >= 0 &&
            point.x <= mapCanvas.clientWidth &&
            point.y <= mapCanvas.clientHeight
          );
        }

        function startLongPress(event) {
          if (!needsLongPressForMapSearch()) return;
          if (event.pointerType && event.pointerType === "mouse") return;
          if (event.isPrimary === false) return;
          if (isMapOverlayTarget(event.target)) return;

          const point = getPointFromClient(event.clientX, event.clientY);
          if (!pointIsInsideMap(point)) return;

          const hits = getSpotHitsAtPoint(point);
          if (hits && hits.length) return;

          clearLongPressTimer();

          longPressPointer = {
            id: event.pointerId,
            clientX: event.clientX,
            clientY: event.clientY,
            point,
            lngLat: map.unproject([point.x, point.y]),
          };

          longPressVisualTimer = window.setTimeout(() => {
            if (!longPressPointer) return;
            showLongPressIndicator(longPressPointer.point);
          }, LONG_PRESS_VISUAL_DELAY_MS);

          longPressTimer = window.setTimeout(() => {
            if (!longPressPointer) return;

            const lngLat = longPressPointer.lngLat;
            suppressNextMapClick = true;

            if (navigator.vibrate) {
              try {
                navigator.vibrate(10);
              } catch (e) {}
            }

            flashLongPressIndicator(longPressPointer.point);
            showSearchPopupAt(lngLat.lng, lngLat.lat);
            clearLongPressTimer();

            window.setTimeout(() => {
              suppressNextMapClick = false;
            }, 900);
          }, LONG_PRESS_MS);
        }

        function moveLongPress(event) {
          if (!longPressPointer) return;
          if (event.pointerId !== longPressPointer.id) return;

          const dx = Math.abs(event.clientX - longPressPointer.clientX);
          const dy = Math.abs(event.clientY - longPressPointer.clientY);

          if (
            dx > LONG_PRESS_MOVE_TOLERANCE_PX ||
            dy > LONG_PRESS_MOVE_TOLERANCE_PX
          ) {
            clearLongPressTimer();
          }
        }

        function endLongPress(event) {
          if (!longPressPointer) return;
          if (event.pointerId !== longPressPointer.id) return;
          clearLongPressTimer();
        }

        if (window.PointerEvent) {
          mapContainer.addEventListener("pointerdown", startLongPress, {
            passive: true,
            capture: true,
          });

          mapContainer.addEventListener("pointermove", moveLongPress, {
            passive: true,
            capture: true,
          });

          mapContainer.addEventListener("pointerup", endLongPress, {
            passive: true,
            capture: true,
          });

          mapContainer.addEventListener("pointercancel", endLongPress, {
            passive: true,
            capture: true,
          });
        } else {
          mapContainer.addEventListener(
            "touchstart",
            (event) => {
              if (!needsLongPressForMapSearch()) return;
              if (event.touches.length !== 1) {
                clearLongPressTimer();
                return;
              }

              if (isMapOverlayTarget(event.target)) return;

              const touch = event.touches[0];
              const point = getPointFromClient(touch.clientX, touch.clientY);
              if (!pointIsInsideMap(point)) return;

              const hits = getSpotHitsAtPoint(point);
              if (hits && hits.length) return;

              clearLongPressTimer();

              longPressPointer = {
                id: "touch",
                clientX: touch.clientX,
                clientY: touch.clientY,
                point,
                lngLat: map.unproject([point.x, point.y]),
              };

              longPressVisualTimer = window.setTimeout(() => {
                if (!longPressPointer) return;
                showLongPressIndicator(longPressPointer.point);
              }, LONG_PRESS_VISUAL_DELAY_MS);

              longPressTimer = window.setTimeout(() => {
                if (!longPressPointer) return;

                const lngLat = longPressPointer.lngLat;
                suppressNextMapClick = true;

                if (navigator.vibrate) {
                  try {
                    navigator.vibrate(10);
                  } catch (e) {}
                }

                flashLongPressIndicator(longPressPointer.point);
                showSearchPopupAt(lngLat.lng, lngLat.lat);
                clearLongPressTimer();

                window.setTimeout(() => {
                  suppressNextMapClick = false;
                }, 900);
              }, LONG_PRESS_MS);
            },
            { passive: true, capture: true },
          );

          mapContainer.addEventListener(
            "touchmove",
            (event) => {
              if (!longPressPointer || !event.touches.length) return;

              const touch = event.touches[0];
              const dx = Math.abs(touch.clientX - longPressPointer.clientX);
              const dy = Math.abs(touch.clientY - longPressPointer.clientY);

              if (
                dx > LONG_PRESS_MOVE_TOLERANCE_PX ||
                dy > LONG_PRESS_MOVE_TOLERANCE_PX
              ) {
                clearLongPressTimer();
              }
            },
            { passive: true, capture: true },
          );

          mapContainer.addEventListener("touchend", clearLongPressTimer, {
            passive: true,
            capture: true,
          });

          mapContainer.addEventListener("touchcancel", clearLongPressTimer, {
            passive: true,
            capture: true,
          });
        }

        updateFooterVisibility();
      });
    </script>
  </body>
</html>
