<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOVA - spots</title>
    <link rel="manifest" href="../../manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="../../images/appicon.JPG" />

    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.css"
      rel="stylesheet"
    />

    <script src="https://cdn.jsdelivr.net/npm/geofire-common@6.0.0/dist/geofire-common/geofire-common.min.js"></script>

    <style>
      :root {
        --bg: transparent;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b7108;
        --panel: rgba(10, 10, 10, 0.94);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        --radius: 18px;
        --success: rgba(163, 214, 158, 0.95);
        --danger: rgba(255, 160, 160, 0.95);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #161515;
        color: var(--fg);
        height: 100dvh;
        overflow: hidden;
      }

      nav {
        width: 100%;
        padding: 22px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        background: var(--bg);
        z-index: 20;
        pointer-events: none;
      }

      nav > * {
        pointer-events: auto;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .nav-left img {
        height: 50px;
        width: auto;
        display: block;
      }

      .beta {
        padding: 2px 6px;
        font-size: 0.85rem;
        background-color: var(--accent);
        color: white;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .nav-right a,
      .nav-right button {
        text-decoration: none;
        color: var(--fg);
        font-size: 0.95rem;
        font-weight: 400;
        line-height: 1.2;
        letter-spacing: 0;
        opacity: 0.8;
        transition:
          opacity 0.25s,
          color 0.25s;
        background: transparent;
        border: 0;
        cursor: pointer;
        padding: 0;
        margin: 0;
        font-family: inherit;
        white-space: nowrap;
        appearance: none;
        -webkit-appearance: none;
      }

      .nav-right a:hover,
      .nav-right button:hover {
        opacity: 1;
        color: var(--accent);
      }

      .navbar-seperator {
        opacity: 0.5;
        font-size: 0.95rem;
        line-height: 1.2;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        z-index: 0;
      }

      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }

      .pinpoint {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 3px solid var(--accent);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.55);
        transform: translate(-50%, -50%);
        position: relative;
        pointer-events: none;
      }

      .pinpoint::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        opacity: 0.9;
      }

      .maplibregl-popup-content {
        background: transparent !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      .maplibregl-popup-tip {
        display: none !important;
      }

      .maplibregl-popup-close-button {
        color: rgba(255, 255, 255, 0.7) !important;
        background: transparent !important;
        font-size: 18px;
        padding: 10px 12px !important;
        z-index: 40;
      }

      footer {
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      footer.footer-hidden {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .join-page {
        color: var(--fg);
        position: absolute;
        bottom: 0%;
        right: 0%;
        padding-bottom: 17px;
        padding-right: 15px;
        z-index: 30;
      }

      .kova-corp {
        position: absolute;
        bottom: 0%;
        padding-left: 15px;
        z-index: 30;
      }

      .kova-popup {
        width: min(600px, calc(100vw - 28px));
        max-height: min(72vh, 760px);
        background: linear-gradient(180deg, var(--panel), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
      }

      .kova-popup .hero {
        position: relative;
        height: clamp(190px, 24vw, 260px);
        background: #111;
        overflow: hidden;
        flex-shrink: 0;
      }

      .kova-popup .body {
        padding: 16px;
        background: linear-gradient(
          180deg,
          rgba(18, 18, 18, 0.92),
          rgba(0, 0, 0, 0.94)
        );
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .kova-popup .hero img {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.05) contrast(1.05);
        transform: scale(1.01);
        opacity: 0;
        transition: opacity 0.28s ease;
      }

      .kova-popup .hero.is-loaded img {
        opacity: 1;
      }

      .kova-popup .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.25) 55%,
          rgba(0, 0, 0, 0.78) 100%
        );
        pointer-events: none;
        z-index: 2;
      }

      .kova-popup .badge {
        position: absolute;
        left: 14px;
        top: 14px;
        padding: 7px 10px;
        font-size: 0.78rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
        z-index: 3;
      }

      .kova-popup .title {
        font-size: clamp(1.06rem, 1.2vw, 1.25rem);
        font-weight: 650;
        line-height: 1.2;
        margin: 0 0 8px 0;
        letter-spacing: 0.2px;
        word-break: break-word;
      }

      .kova-popup .desc {
        margin: 0 0 10px 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.96rem;
        line-height: 1.5;
        word-break: break-word;
      }

      .kova-popup .byline {
        margin: 0 0 14px 0;
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.2px;
        word-break: break-word;
      }

      .kova-popup .byline b {
        color: rgba(255, 255, 255, 0.9);
        font-weight: 650;
      }

      .kova-btn {
        appearance: none;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 650;
        letter-spacing: 0.2px;
        transition:
          transform 0.12s ease,
          background 0.2s ease,
          border-color 0.2s ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
        min-height: 46px;
      }

      .kova-btn:hover {
        background: rgba(255, 255, 255, 0.085);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .kova-btn.primary {
        background: rgba(139, 113, 8, 0.95);
        border-color: rgba(139, 113, 8, 0.95);
        color: #fff;
      }

      .kova-btn.primary:hover {
        background: rgba(139, 113, 8, 1);
      }

      .kova-btn .sub {
        display: block;
        font-weight: 500;
        font-size: 0.78rem;
        opacity: 0.9;
        margin-top: 2px;
      }

      .kova-fallback,
      .kova-loading {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at 30% 20%,
            rgba(139, 113, 8, 0.25),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 80%,
            rgba(255, 255, 255, 0.08),
            transparent 50%
          ),
          #0b0b0b;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      .kova-loading {
        z-index: 1;
        flex-direction: column;
        gap: 10px;
      }

      .kova-loading.hidden,
      .kova-fallback.hidden {
        display: none;
      }

      .kova-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.18);
        border-top-color: rgba(255, 255, 255, 0.88);
        animation: spin 0.8s linear infinite;
      }

      .kova-loading-text {
        font-size: 0.9rem;
        color: rgba(255, 255, 255, 0.78);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .coord-popup {
        background: #1e1e1e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        padding: 10px 12px;
        color: white;
        min-width: 180px;
        max-width: min(320px, calc(100vw - 32px));
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
      }

      .coord-popup strong {
        display: block;
        margin-bottom: 6px;
      }

      .coord-popup .coords {
        display: block;
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.92rem;
        line-height: 1.35;
        word-break: break-word;
      }

      .coord-popup .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .coord-popup .btn-row.single {
        grid-template-columns: 1fr;
      }

      .coord-popup button {
        padding: 10px 10px;
        min-height: 42px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.14);
        cursor: pointer;
        font-weight: 650;
        border-radius: 10px;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .coord-popup button.primary {
        background: #8b7108;
        border-color: #8b7108;
      }

      .user-popup-card {
        width: 180px;
        text-align: center;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(180deg, var(--panel), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 16px;
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .user-popup-card img {
        width: 100%;
        height: auto;
        display: block;
      }

      .user-popup-card .body {
        padding: 12px;
        color: white;
        font-size: 0.92rem;
      }

      .player-marker {
        cursor: pointer;
        pointer-events: auto;
      }

      .spot-meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin: 14px 0 14px 0;
      }

      .spot-card-box {
        background: rgba(255, 255, 255, 0.045);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 12px;
        min-width: 0;
      }

      .spot-box-title {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.7px;
        color: rgba(255, 255, 255, 0.58);
        margin-bottom: 10px;
      }

      .rating-summary {
        font-size: 0.96rem;
        color: rgba(255, 255, 255, 0.94);
        line-height: 1.45;
        word-break: break-word;
      }

      .rating-summary small {
        color: rgba(255, 255, 255, 0.62);
        font-size: 0.82rem;
        display: inline-block;
        margin-left: 3px;
      }

      .stars-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }

      .star-btn {
        appearance: none;
        border: 0;
        background: transparent;
        color: rgba(255, 255, 255, 0.28);
        font-size: 1.65rem;
        line-height: 1;
        padding: 2px;
        cursor: pointer;
        transition:
          transform 0.12s ease,
          color 0.16s ease,
          opacity 0.16s ease;
        min-width: 32px;
        min-height: 32px;
      }

      .star-btn.active {
        color: #d7b84c;
      }

      .star-btn:hover {
        transform: translateY(-1px);
      }

      .star-btn.disabled {
        cursor: default;
        opacity: 0.45;
        pointer-events: none;
      }

      .rating-note {
        margin-top: 8px;
        font-size: 0.84rem;
        color: rgba(255, 255, 255, 0.65);
        line-height: 1.45;
      }

      .popup-status {
        margin-top: 9px;
        font-size: 0.84rem;
        color: rgba(255, 255, 255, 0.72);
        line-height: 1.4;
        min-height: 18px;
      }

      .popup-status.success {
        color: var(--success);
      }

      .popup-status.error {
        color: var(--danger);
      }

      @media (min-width: 880px) {
        .spot-meta {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 700px) {
        .spot-sheet-popup.maplibregl-popup {
          position: fixed !important;
          left: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          top: auto !important;
          transform: none !important;
          margin: 0 !important;
          z-index: 9999 !important;
          pointer-events: none;
          width: 100% !important;
          max-width: 100% !important;
        }

        .spot-sheet-popup .maplibregl-popup-content {
          width: 100vw !important;
          max-width: 100vw !important;
          pointer-events: auto;
          padding: 0 8px 8px 8px !important;
          box-sizing: border-box;
        }

        .spot-sheet-popup .maplibregl-popup-close-button {
          top: 8px;
          right: 8px;
          font-size: 20px;
        }

        .kova-popup {
          width: 100% !important;
          max-height: min(88dvh, 900px);
          border-radius: 22px 22px 0 0;
          border-left: 0;
          border-right: 0;
          border-bottom: 0;
        }

        .kova-popup .hero {
          height: 210px;
        }

        .kova-popup .body {
          padding: 14px;
        }

        .stars-row {
          gap: 6px;
        }

        .star-btn {
          font-size: 1.55rem;
        }
      }

      @media (max-width: 600px) {
        nav {
          padding: 14px 14px;
          align-items: flex-start;
          gap: 12px;
        }

        .nav-left img {
          height: 38px;
        }

        .beta {
          font-size: 0.7rem;
          padding: 2px 5px;
        }

        .nav-right {
          gap: 8px;
          row-gap: 4px;
          max-width: 55%;
        }

        .nav-right a,
        .nav-right button,
        .navbar-seperator {
          font-size: 0.82rem;
          line-height: 1.2;
        }

        .kova-popup .hero {
          height: 190px;
        }

        .coord-popup {
          min-width: 0;
          width: min(280px, calc(100vw - 28px));
        }

        .coord-popup .btn-row {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 420px) {
        .nav-right {
          max-width: 58%;
        }

        .kova-popup .hero {
          height: 176px;
        }

        .rating-summary {
          font-size: 0.92rem;
        }

        .kova-btn {
          font-size: 0.92rem;
        }
      }
    </style>
  </head>

      <p class="kova-corp">kova corp © 2026</p>

      </a>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        maptilersdk.config.apiKey = "7TBqy4hTdFfQeIq7oXKj";

        const DEFAULT_CENTER = [4.5, 50.85];
        const DEFAULT_ZOOM = 7.5;
        const USER_START_ZOOM = 13.5;

        const SEARCH_RADIUS_KM = 10;
        const DUPLICATE_BLOCK_RADIUS_M = 80;
        const LOCAL_RATINGS_KEY = "kova_spot_ratings_v1";

        const map = new maptilersdk.Map({
          container: "map",
          style:
            "https://api.maptiler.com/maps/dataviz-dark/style.json?key=7TBqy4hTdFfQeIq7oXKj",
          center: DEFAULT_CENTER,
          zoom: DEFAULT_ZOOM,
          minZoom: 5,
          navigationControl: false,
          projectionControl: false,
          geolocateControl: false,
          doubleClickZoom: false,
        });

        if (map.doubleClickZoom) map.doubleClickZoom.disable();

        map.on("dblclick", (e) => {
          e.preventDefault();
        });

        const firebaseConfig = {
          apiKey: "AIzaSyARxFI9HyJxrINfzDazhxFHKSrGLX8KoBk",
          authDomain: "kova-6052a.firebaseapp.com",
          projectId: "kova-6052a",
          storageBucket: "kova-6052a.firebasestorage.app",
          messagingSenderId: "873689812978",
          appId: "1:873689812978:web:e0581f3df823e51239656b",
          measurementId: "G-VM5224Z3K6",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const footerEl = document.getElementById("kovaFooter");

        let activePopup = null;
        let activeCoordPopup = null;
        let clickPin = null;
        let userMarker = null;
        let userPopup = null;
        let userMarkerEl = null;
        let userLat = null;
        let userLng = null;
        let mapLoaded = false;
        let initialNearbyLoaded = false;

        const SOURCE_ID = "spots";
        const LAYER_CLUSTERS = "spots-clusters";
        const LAYER_CLUSTER_COUNT = "spots-cluster-count";
        const LAYER_POINTS = "spots-points";

        function getLocalRatings() {
          try {
            const raw = localStorage.getItem(LOCAL_RATINGS_KEY);
            const parsed = raw ? JSON.parse(raw) : {};
            return parsed && typeof parsed === "object" ? parsed : {};
          } catch (e) {
            return {};
          }
        }

        function setLocalRatings(ratings) {
          try {
            localStorage.setItem(LOCAL_RATINGS_KEY, JSON.stringify(ratings));
          } catch (e) {}
        }

        function getLocalRating(spotId) {
          const ratings = getLocalRatings();
          const value = Number(ratings[spotId]);
          return Number.isInteger(value) && value >= 1 && value <= 5
            ? value
            : null;
        }

        function setLocalRating(spotId, value) {
          const ratings = getLocalRatings();
          ratings[spotId] = value;
          setLocalRatings(ratings);
        }

        const showFooter = () =>
          footerEl && footerEl.classList.remove("footer-hidden");
        const hideFooter = () =>
          footerEl && footerEl.classList.add("footer-hidden");

        function updateFooterVisibility() {
          const somethingOpen =
            !!activePopup ||
            !!activeCoordPopup ||
            !!(userPopup && userPopup.isOpen());

          if (somethingOpen) hideFooter();
          else showFooter();
        }

        function escapeHTML(str) {
          return String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function safeHttpsURL(url) {
          const s = String(url || "").trim();
          return s.startsWith("https://") ? s : "";
        }

        function setStatus(el, message = "", type = "") {
          if (!el) return;
          el.textContent = message;
          el.classList.remove("success", "error");
          if (type) el.classList.add(type);
        }

        function openNavigation(lat, lng) {
          const isApple = /iPad|iPhone|iPod/.test(navigator.userAgent);
          const isAndroid = /Android/.test(navigator.userAgent);
          const q = `${lat},${lng}`;
          const label = "KOVA Spot";

          if (isAndroid) {
            window.location.href = `geo:${q}?q=${q}(${encodeURIComponent(label)})`;
            return;
          }

          if (isApple) {
            window.location.href = `https://maps.apple.com/?daddr=${encodeURIComponent(
              q,
            )}&dirflg=d`;
            return;
          }

        function emptyGeoJSON() {
          return { type: "FeatureCollection", features: [] };

        function setSpotsGeoJSON(features) {
          const src = map.getSource(SOURCE_ID);
          if (!src) return;
          src.setData({
            type: "FeatureCollection",
            features,
          });
        }

        function toRad(x) {
          return (x * Math.PI) / 180;
        }

        function haversineMeters(aLat, aLng, bLat, bLng) {
          const R = 6371000;
          const dLat = toRad(bLat - aLat);
          const dLng = toRad(bLng - aLng);

          const s1 =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(aLat)) *
              Math.cos(toRad(bLat)) *
              Math.sin(dLng / 2) *
              Math.sin(dLng / 2);

          const c = 2 * Math.atan2(Math.sqrt(s1), Math.sqrt(1 - s1));
          return R * c;
        }

        function getBoundsForRadius(lat, lng, radiusKm) {
          const safeCos = Math.max(Math.cos((lat * Math.PI) / 180), 0.01);
          const latDelta = radiusKm / 111;
          const lngDelta = radiusKm / (111 * safeCos);

          return {
            minLat: lat - latDelta,
            maxLat: lat + latDelta,
            minLng: lng - lngDelta,
            maxLng: lng + lngDelta,
          };
        }

        function renderInteractiveStars(
          starsRow,

            html += `

                data-rate-value="${i}"
                ${disabled ? "disabled" : ""}

          starsRow.innerHTML = html;
        }

        async function rateSpot(spotId, newRating) {
          if (!Number.isInteger(newRating) || newRating < 1 || newRating > 5) {
            throw new Error("Invalid rating.");
          }

          const previousRating = getLocalRating(spotId);
          if (previousRating) {
            throw new Error("This spot has already been rated on this device.");
          }

          const spotRef = db.collection("spots").doc(spotId);

          await db.runTransaction(async (transaction) => {
            const spotSnap = await transaction.get(spotRef);

            if (!spotSnap.exists) {
              throw new Error("Spot not found.");
            }

            const spotData = spotSnap.data() || {};
            let ratingSum = Number(spotData.ratingSum || 0);
            let ratingCount = Number(spotData.ratingCount || 0);

            ratingSum += newRating;
            ratingCount += 1;

            if (ratingCount < 0) ratingCount = 0;
            if (ratingSum < 0) ratingSum = 0;

            const avgRating = ratingCount > 0 ? ratingSum / ratingCount : 0;

            transaction.set(
              spotRef,
              {
                ratingSum: Math.round(ratingSum),
                ratingCount: Math.round(ratingCount),
                avgRating: Number(avgRating.toFixed(2)),
              },
              { merge: true },
            );
          });

          setLocalRating(spotId, newRating);
        }

        async function getSpotDocData(spotId) {
          const snap = await db.collection("spots").doc(spotId).get();
          return snap.exists ? snap.data() || {} : {};
        }

        async function hydratePopupData(popup, fallbackProps = {}) {
          if (!popup) return;
          const popupEl = popup.getElement();
          if (!popupEl) return;

          const card = popupEl.querySelector(".kova-popup[data-spot-id]");
          if (!card) return;

          const spotId = card.getAttribute("data-spot-id") || fallbackProps.id;
          if (!spotId) return;

          const ratingSummaryEl = popupEl.querySelector(
            "[data-rating-summary]",
          );
          const starsRowEl = popupEl.querySelector("[data-stars-row]");
          const ratingNoteEl = popupEl.querySelector("[data-rating-note]");
          const ratingStatusEl = popupEl.querySelector("[data-rating-status]");

          try {
            const spotData = await getSpotDocData(spotId);
            const localRating = getLocalRating(spotId);
            const avgRating = Number(spotData.avgRating || 0);
            const ratingCount = Number(spotData.ratingCount || 0);
            const alreadyRated = localRating !== null;

            if (ratingSummaryEl) {
              ratingSummaryEl.innerHTML = `
                ${renderStars(avgRating)} ${avgRating.toFixed(1)}
                <small>(${ratingCount} ratings)</small>
              `;
            }

            renderInteractiveStars(starsRowEl, localRating || 0, alreadyRated);

            if (ratingNoteEl) {
              ratingNoteEl.textContent = alreadyRated
                ? `You already rated this spot on this device: ${localRating}/5`
                : "Tap a star to rate this spot.";
            }

            setStatus(ratingStatusEl, "");
          } catch (err) {
            console.error("Popup hydrate error:", err);
            setStatus(ratingStatusEl, "Could not load rating data.", "error");
          }

          if (starsRowEl && !starsRowEl.dataset.bound) {
            starsRowEl.dataset.bound = "true";

            starsRowEl.addEventListener("click", async (e) => {
              const btn = e.target.closest("[data-rate-value]");
              if (!btn) return;

              const spotCard = popupEl.querySelector(
                ".kova-popup[data-spot-id]",
              );
              const liveSpotId = spotCard?.getAttribute("data-spot-id");
              const value = Number(btn.getAttribute("data-rate-value"));

              if (!liveSpotId || !Number.isInteger(value)) return;

              const ratingStatusElLocal = popupEl.querySelector(
                "[data-rating-status]",
              );
              const ratingNoteElLocal =
                popupEl.querySelector("[data-rating-note]");

              if (getLocalRating(liveSpotId) !== null) {
                setStatus(
                  ratingStatusElLocal,
                  "You already rated this spot on this device.",
                  "error",
                );
                return;
              }

              try {
                setStatus(ratingStatusElLocal, "Saving rating...");
                await rateSpot(liveSpotId, value);
                setStatus(ratingStatusElLocal, "Rating saved.", "success");

                if (ratingNoteElLocal) {
                  ratingNoteElLocal.textContent = `You already rated this spot on this device: ${value}/5`;
                }

                await hydratePopupData(popup, { id: liveSpotId });
              } catch (err) {
                console.error("Rating error:", err);
                setStatus(
                  ratingStatusElLocal,
                  err?.message || "Could not save rating.",
                  "error",
                );
              }
            });
          }
        }

        async function findNearbyExistingSpot(
          lat,
          lng,
          radiusM = DUPLICATE_BLOCK_RADIUS_M,
        ) {
          const docsById = new Map();
          const radiusKm = radiusM / 1000;
          const canGeoHash =
            window.geofire &&
            typeof window.geofire.geohashQueryBounds === "function";

          try {
            if (canGeoHash) {
              const bounds = window.geofire.geohashQueryBounds(
                [lat, lng],
                radiusM,
              );

              await Promise.all(
                bounds.map(async (bound) => {
                  const q = db
                    .collection("spots")
                    .orderBy("geohash")
                    .startAt(bound[0])
                    .endAt(bound[1]);

                  const snap = await q.get();
                  snap.forEach((doc) => {
                    docsById.set(doc.id, { id: doc.id, ...doc.data() });
                  });
                }),
              );
            } else {
              const box = getBoundsForRadius(lat, lng, radiusKm);
              const q = db
                .collection("spots")
                .where("lat", ">=", box.minLat)
                .where("lat", "<=", box.maxLat);

              const snap = await q.get();
              snap.forEach((doc) => {
                const d = doc.data();
                if (
                  d &&
                  typeof d.lng === "number" &&
                  d.lng >= box.minLng &&
                  d.lng <= box.maxLng
                ) {
                  docsById.set(doc.id, { id: doc.id, ...d });
                }
              });
            }
          } catch (err) {
            console.error("Duplicate check error:", err);
            return null;
          }

          let nearest = null;

          docsById.forEach((spot) => {
            if (
              !spot ||
              typeof spot.lat !== "number" ||
              typeof spot.lng !== "number"
            ) {
              return;
            }

            const distance = haversineMeters(lat, lng, spot.lat, spot.lng);

            if (distance <= radiusM) {
              if (!nearest || distance < nearest.distance) {
                nearest = { ...spot, distance };
              }
            }
          });

          return nearest;
        }

        async function fetchSpotsInRadius(
          centerLat,
          centerLng,
          radiusKm = SEARCH_RADIUS_KM,
          options = {},
        ) {
          const { recenter = true, showEmptyPopup = true } = options;
          const radiusM = radiusKm * 1000;
          const docsById = new Map();
          const canGeoHash =
            window.geofire &&
            typeof window.geofire.geohashQueryBounds === "function";

          try {
            if (canGeoHash) {
              const bounds = window.geofire.geohashQueryBounds(
                [centerLat, centerLng],
                radiusM,
              );

              await Promise.all(
                bounds.map(async (bound) => {
                  const q = db
                    .collection("spots")
                    .orderBy("geohash")
                    .startAt(bound[0])
                    .endAt(bound[1]);

                  const snap = await q.get();
                  snap.forEach((doc) => {
                    docsById.set(doc.id, doc.data());
                  });
                }),
              );
            } else {
              const box = getBoundsForRadius(centerLat, centerLng, radiusKm);
              const q = db
                .collection("spots")
                .where("lat", ">=", box.minLat)
                .where("lat", "<=", box.maxLat);

              const snap = await q.get();
              snap.forEach((doc) => {
                const d = doc.data();
                if (
                  d &&
                  typeof d.lng === "number" &&
                  d.lng >= box.minLng &&
                  d.lng <= box.maxLng
                ) {
                  docsById.set(doc.id, d);
                }
              });
            }
          } catch (err) {
            console.error("Radius fetch error:", err);
            return;
          }

          const features = [];

          docsById.forEach((spot, id) => {
            if (
              !spot ||
              typeof spot.lat !== "number" ||
              typeof spot.lng !== "number"
            ) {
              return;
            }

            const distance = haversineMeters(
              centerLat,
              centerLng,
              spot.lat,
              spot.lng,
            );

            if (distance > radiusM) return;

            features.push({
              type: "Feature",
              geometry: {
                type: "Point",
                coordinates: [spot.lng, spot.lat],
              },
              properties: {
                id,
                name: spot.name || "",
                description: spot.description || "",
                addedBy: spot.addedBy || "",
                added_by: spot.added_by || "",
                author: spot.author || "",
                photoURL: spot.photoURL || "",
                lat: spot.lat,
                lng: spot.lng,
                avgRating: Number(spot.avgRating || 0),
                ratingCount: Number(spot.ratingCount || 0),
              },
            });
          });

          setSpotsGeoJSON(features);

          if (features.length === 0) {
            if (showEmptyPopup) {
              showNoSpotsPopup(centerLat, centerLng, radiusKm);
            }
            return;
          }

          closeCoordPopup();

          if (recenter) {
            map.easeTo({
              center: [centerLng, centerLat],
              zoom: Math.max(map.getZoom(), 11),
              duration: 500,
            });
          }
        }

        async function zoomToClusterSpots(clusterId, fallbackCoords) {
          const src = map.getSource(SOURCE_ID);
          if (!src) return;

          try {
            const leaves = await src.getClusterLeaves(
              Number(clusterId),
              100,
              0,
            );

            if (Array.isArray(leaves) && leaves.length > 1) {
              const bounds = new maptilersdk.LngLatBounds();

              leaves.forEach((leaf) => {
                const coords = leaf?.geometry?.coordinates;
                if (
                  Array.isArray(coords) &&
                  typeof coords[0] === "number" &&
                  typeof coords[1] === "number"
                ) {
                  bounds.extend(coords);
                }
              });

              if (!bounds.isEmpty()) {
                map.fitBounds(bounds, {
                  padding: { top: 90, bottom: 90, left: 90, right: 90 },
                  maxZoom: 15,
                  duration: 650,
                });
                return;
              }
            }

            if (Array.isArray(leaves) && leaves.length === 1) {
              const onlyCoords = leaves[0]?.geometry?.coordinates;
              if (Array.isArray(onlyCoords)) {
                map.easeTo({
                  center: onlyCoords,
                  zoom: Math.max(map.getZoom(), 14),
                  duration: 520,
                });
                return;
              }
            }

            const zoom = await src.getClusterExpansionZoom(Number(clusterId));
            map.easeTo({
              center: fallbackCoords,
              zoom,
              duration: 520,
            });
          } catch (err) {
            console.error("Cluster zoom error:", err);

            try {
              const zoom = await src.getClusterExpansionZoom(Number(clusterId));
              map.easeTo({
                center: fallbackCoords,
                zoom,
                duration: 520,
              });
            } catch (fallbackErr) {
              console.error("Cluster fallback zoom error:", fallbackErr);
            }
          }
        }

        async function maybeLoadInitialNearbySpots() {

            !mapLoaded ||
            typeof userLat !== "number" ||
            typeof userLng !== "number"

          await fetchSpotsInRadius(userLat, userLng, SEARCH_RADIUS_KM, {
            recenter: false,
            showEmptyPopup: false,
          });
        }

        async function refreshNearbyUserSpots() {
          if (
            typeof userLat !== "number" ||
            typeof userLng !== "number" ||
            !mapLoaded
          ) {
            return;
          }

          map.jumpTo({
            center: [userLng, userLat],
            zoom: USER_START_ZOOM,
          });

          await fetchSpotsInRadius(userLat, userLng, SEARCH_RADIUS_KM, {
            recenter: false,
            showEmptyPopup: false,
          });
        }

        if (navigator.geolocation) {
          userMarkerEl = document.createElement("img");

          userMarkerEl.style.width = "28px";
          userMarkerEl.style.height = "28px";

          const userPopupHTML = `

          userPopup = new maptilersdk.Popup({

            if (activePopup) {
              activePopup.remove();
              activePopup = null;

            }

            await refreshNearbyUserSpots();
            updateFooterVisibility();
          });

          userPopup.on("open", updateFooterVisibility);
          userPopup.on("close", updateFooterVisibility);

          navigator.geolocation.getCurrentPosition(
            async (pos) => {
              userLng = pos.coords.longitude;
              userLat = pos.coords.latitude;
              await maybeLoadInitialNearbySpots();
            },
            (err) => {
              console.warn("Locatie fout:", err.message);
            },
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 30000,
            },
          );
        }

        document.addEventListener("click", async (e) => {
          const navBtn = e.target.closest("[data-action='nav']");
          if (navBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(navBtn.getAttribute("data-lat"));
            const lng = Number(navBtn.getAttribute("data-lng"));
            openNavigation(lat, lng);
            return;
          }

          const addBtn = e.target.closest("[data-action='add-spot']");
          if (addBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(addBtn.getAttribute("data-lat"));
            const lng = Number(addBtn.getAttribute("data-lng"));

            const existingSpot = await findNearbyExistingSpot(
              lat,
              lng,
              DUPLICATE_BLOCK_RADIUS_M,
            );

            if (existingSpot) {
              showDuplicateSpotPopup(lat, lng, existingSpot);
              return;
            }

            await goAddSpot(lat, lng);
            return;
          }

          const showBtn = e.target.closest("[data-action='show-spots']");
          if (showBtn) {
            e.preventDefault();
            e.stopPropagation();

            const lat = Number(showBtn.getAttribute("data-lat"));
            const lng = Number(showBtn.getAttribute("data-lng"));
            const radiusKm =
              Number(showBtn.getAttribute("data-radius")) || SEARCH_RADIUS_KM;

            await fetchSpotsInRadius(lat, lng, radiusKm);
            return;
          }
        });

        map.on("load", async () => {
          mapLoaded = true;

          map.addSource(SOURCE_ID, {
            type: "geojson",
            data: emptyGeoJSON(),
            cluster: true,
            clusterMaxZoom: 13,
            clusterRadius: 55,
          });

          map.addLayer({
            id: LAYER_CLUSTERS,
            type: "circle",
            source: SOURCE_ID,
            filter: ["has", "point_count"],
            paint: {
              "circle-color": "rgba(139, 113, 8, 0.95)",
              "circle-stroke-color": "rgba(0,0,0,0.85)",
              "circle-stroke-width": 2,
              "circle-radius": [
                "step",
                ["get", "point_count"],
                18,
                25,
                22,
                75,
                26,
                200,
                32,
              ],
              "circle-opacity": 0.95,
            },
          });

          map.addLayer({
            id: LAYER_CLUSTER_COUNT,
            type: "symbol",
            source: SOURCE_ID,
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              "text-font": ["Open Sans Bold"],
              "text-size": 12,
            },
            paint: {
              "text-color": "#0b0b0b",
            },
          });

          map.addLayer({
            id: LAYER_POINTS,
            type: "circle",
            source: SOURCE_ID,
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "rgba(139, 113, 8, 1)",
              "circle-stroke-color": "rgba(0,0,0,0.9)",
              "circle-stroke-width": 2,
              "circle-radius": 8,
            },
          });

          map.on("mouseenter", LAYER_POINTS, () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", LAYER_POINTS, () => {
            map.getCanvas().style.cursor = "";
          });

          map.on("mouseenter", LAYER_CLUSTERS, () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", LAYER_CLUSTERS, () => {
            map.getCanvas().style.cursor = "";
          });

          map.on("click", LAYER_CLUSTERS, async (e) => {
            const feature = e.features?.[0];
            if (!feature) return;

            const clusterId = Number(feature.properties?.cluster_id);
            if (!Number.isFinite(clusterId)) return;

            closeCoordPopup();
            closeUserPopup();

            if (activePopup) {
              activePopup.remove();
              activePopup = null;
            }

            const coords = feature.geometry.coordinates;
            await zoomToClusterSpots(clusterId, coords);
          });

          map.on("click", LAYER_POINTS, async (e) => {
            const f = e.features?.[0];
            if (!f) return;

            closeCoordPopup();
            closeUserPopup();

            if (activePopup) {
              activePopup.remove();
            }

            const coords = f.geometry.coordinates;
            const props = { ...(f.properties || {}) };

            props.id = String(props.id || "");
            props.lat = Number(props.lat);
            props.lng = Number(props.lng);
            props.avgRating = Number(props.avgRating || 0);
            props.ratingCount = Number(props.ratingCount || 0);

            const popup = new maptilersdk.Popup({
              offset: 18,
              maxWidth: "620px",
              closeButton: true,
              closeOnClick: false,
              className: "spot-sheet-popup",
            })
              .setLngLat(coords)
              .setHTML(makeSpotPopupHTML(props))
              .addTo(map);

            activePopup = popup;
            attachPopupImageLoader(popup);
            updateFooterVisibility();

            easeToSpotWithPopupSpace(coords[0], coords[1]);

            await hydratePopupData(popup, props);

            popup.once("close", () => {
              activePopup = null;
              updateFooterVisibility();
            });
          });

          await maybeLoadInitialNearbySpots();
        });

        map.on("dragstart", closeAll);

        map.on("click", async (event) => {
          const target = event.originalEvent?.target;

          if (
            target &&
            (target.closest(".player-marker") ||
              target.closest(".user-popup-card") ||
              target.closest(".user-map-popup") ||
              target.closest(".maplibregl-popup"))
          ) {
            return;
          }

          const hits = map.queryRenderedFeatures(event.point, {
            layers: [LAYER_CLUSTERS, LAYER_POINTS],
          });

          if (hits && hits.length) return;

          closeUserPopup();

          if (activePopup) {
            activePopup.remove();
            activePopup = null;
          }

          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
          }

          const { lng, lat } = event.lngLat;

          placeClickPin(lng, lat);

          const existingSpot = await findNearbyExistingSpot(
            lat,
            lng,
            DUPLICATE_BLOCK_RADIUS_M,
          );

          if (existingSpot) {
            showDuplicateSpotPopup(lat, lng, existingSpot);
            return;
          }

          const popupHTML = `
            <div class="coord-popup">
              <strong>Coordinates</strong>
              <span class="coords">Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(
                5,
              )}</span>
              <div class="btn-row">
                <button data-action="show-spots" data-lat="${lat}" data-lng="${lng}" data-radius="${SEARCH_RADIUS_KM}">
                  Show spots
                </button>
                <button class="primary" data-action="add-spot" data-lat="${lat}" data-lng="${lng}">
                  Add spot
                </button>
              </div>
            </div>
          `;

          activeCoordPopup = new maptilersdk.Popup({
            offset: 18,
            closeButton: true,
            closeOnClick: false,
            maxWidth: "320px",
            className: "coord-map-popup",
          })
            .setLngLat([lng, lat])
            .setHTML(popupHTML)
            .addTo(map);

          updateFooterVisibility();

          activeCoordPopup.once("close", () => {
            activeCoordPopup = null;
            removeClickPin();
            updateFooterVisibility();
          });
        });

        updateFooterVisibility();
      });
    </script>
  </body>
</html>
