<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOVA - spots</title>
    <link rel="manifest" href="../../manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="../../images/appicon.JPG" />
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: transparent;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b7108;

        --panel: rgba(10, 10, 10, 0.92);
        --panel2: rgba(18, 18, 18, 0.92);
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
        --radius: 18px;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
        background: #161515;
        color: var(--fg);
        height: 100dvh;
        overflow: hidden;
      }

      nav {
        width: 100%;
        padding: 22px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        background: var(--bg);
        z-index: 20;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-left img {
        height: 50px;
        width: auto;
      }

      .beta {
        padding: 2px;
        font-size: 0.85rem;
        background-color: var(--accent);
        color: white;
        letter-spacing: 0.5px;
      }

      .nav-right a {
        margin-left: 32px;
        text-decoration: none;
        color: var(--fg);
        font-size: 0.95rem;
        opacity: 0.8;
        transition: opacity 0.25s, color 0.25s;
      }

      .nav-right a:hover {
        opacity: 1;
        color: var(--accent);
      }

      .navbar-seperator {
        margin-left: 20px;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        z-index: 0;
      }

      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }

      .spot-marker {
        width: 20px;
        height: 20px;
        background-color: var(--accent);
        border: 2px solid black;
        border-radius: 50%;
        box-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
        cursor: pointer;
        transform: translate(-50%, -50%);
      }

      /* NEW: pinpoint marker for "where you clicked" */
      .pinpoint {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 3px solid var(--accent);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.55);
        transform: translate(-50%, -50%);
        position: relative;
        pointer-events: none; /* can't block clicks */
      }
      .pinpoint::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        opacity: 0.9;
      }

      .maplibregl-popup-content {
        background: transparent !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      .maplibregl-popup-tip {
        display: none !important;
      }

      .maplibregl-popup-close-button {
        color: rgba(255, 255, 255, 0.7) !important;
        background: transparent !important;
        font-size: 18px;
        padding: 10px 12px !important;
      }

      footer {
        transition: opacity 0.18s ease, transform 0.18s ease;
      }
      footer.footer-hidden {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .join-page {
        color: var(--fg);
        position: absolute;
        bottom: 0%;
        right: 0%;
        padding-bottom: 17px;
        padding-right: 15px;
        z-index: 30;
      }

      .kova-corp {
        position: absolute;
        bottom: 0%;
        padding-left: 15px;
        z-index: 30;
      }

      .kova-popup {
        width: min(520px, calc(100vw - 28px));
        background: linear-gradient(180deg, var(--panel), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .kova-popup .hero {
        position: relative;
        height: 240px;
        background: #111;
        overflow: hidden;
      }

      .kova-popup .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.05) contrast(1.05);
        transform: scale(1.01);
      }

      .kova-popup .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.25) 55%,
          rgba(0, 0, 0, 0.75) 100%
        );
        pointer-events: none;
      }

      .kova-popup .badge {
        position: absolute;
        left: 14px;
        top: 14px;
        padding: 7px 10px;
        font-size: 0.78rem;
        letter-spacing: 0.6px;
        text-transform: uppercase;
        background: rgba(0, 0, 0, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(8px);
      }

      .kova-popup .body {
        padding: 16px 16px 14px 16px;
        background: linear-gradient(
          180deg,
          rgba(18, 18, 18, 0.92),
          rgba(0, 0, 0, 0.92)
        );
      }

      .kova-popup .title {
        font-size: 1.15rem;
        font-weight: 650;
        line-height: 1.2;
        margin: 0 0 8px 0;
        letter-spacing: 0.2px;
      }

      .kova-popup .desc {
        margin: 0 0 10px 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 0.96rem;
        line-height: 1.35;
      }

      .kova-popup .byline {
        margin: 0 0 14px 0;
        font-size: 0.86rem;
        color: rgba(255, 255, 255, 0.65);
        letter-spacing: 0.2px;
      }
      .kova-popup .byline b {
        color: rgba(255, 255, 255, 0.9);
        font-weight: 650;
      }

      .kova-btn {
        appearance: none;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        padding: 12px 14px;
        border-radius: 14px;
        cursor: pointer;
        font-weight: 650;
        letter-spacing: 0.2px;
        transition: transform 0.12s ease, background 0.2s ease,
          border-color 0.2s ease;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }

      .kova-btn:hover {
        background: rgba(255, 255, 255, 0.085);
        border-color: rgba(255, 255, 255, 0.18);
        transform: translateY(-1px);
      }

      .kova-btn.primary {
        background: rgba(139, 113, 8, 0.95);
        border-color: rgba(139, 113, 8, 0.95);
        color: #fff;
      }

      .kova-btn.primary:hover {
        background: rgba(139, 113, 8, 1);
      }

      .kova-btn .sub {
        display: block;
        font-weight: 500;
        font-size: 0.78rem;
        opacity: 0.9;
        margin-top: 2px;
      }

      .kova-fallback {
        height: 240px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
            circle at 30% 20%,
            rgba(139, 113, 8, 0.25),
            transparent 55%
          ),
          radial-gradient(
            circle at 70% 80%,
            rgba(255, 255, 255, 0.08),
            transparent 50%
          ),
          #0b0b0b;
        color: rgba(255, 255, 255, 0.85);
        font-weight: 600;
        letter-spacing: 0.2px;
      }

      @media (max-width: 700px) {
        .maplibregl-popup {
          position: fixed !important;
          left: 0 !important;
          right: 0 !important;
          bottom: 0 !important;
          top: auto !important;
          transform: none !important;
          margin: 0 !important;
          z-index: 9999 !important;
          pointer-events: none;
        }

        .maplibregl-popup-content {
          width: 100vw !important;
          pointer-events: auto;
          padding: 0 10px 10px 10px !important;
          box-sizing: border-box;
        }

        .kova-popup {
          width: 100% !important;
          border-radius: 22px 22px 0 0;
          border-left: 0;
          border-right: 0;
          border-bottom: 0;
        }

        .kova-popup .hero {
          height: 210px;
        }
      }

      .coord-popup {
        background: #1e1e1e;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
        padding: 10px 12px;
        color: white;
        min-width: 180px;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      .coord-popup strong {
        display: block;
        margin-bottom: 6px;
      }
      .coord-popup .coords {
        display: block;
        margin-bottom: 10px;
        color: rgba(255, 255, 255, 0.82);
        font-size: 0.92rem;
        line-height: 1.25;
      }
      .coord-popup .btn-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .coord-popup button {
        padding: 9px 10px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.14);
        cursor: pointer;
        font-weight: 650;
        border-radius: 10px;
        -webkit-tap-highlight-color: transparent;
        touch-action: manipulation;
      }
      .coord-popup button.primary {
        background: #8b7108;
        border-color: #8b7108;
      }

      @media (max-width: 600px) {
        nav {
          padding: 16px 18px;
        }
        .nav-left img {
          height: 40px;
        }
        .beta {
          font-size: 0.7rem;
          padding: 2px 5px;
        }
        .nav-right a {
          margin-left: 0;
          font-size: 0.85rem;
        }
        .navbar-seperator {
          margin-left: 0;
          opacity: 0.5;
        }
      }
    </style>
  </head>

  <body>
    <nav>
      <div class="nav-left">
        <a href="../../index.html">
          <img src="../../images/kogaskeer.png" alt="Kova logo small" />
        </a>
        <div class="beta">
          <a href="../../app/pages/tutorial.html" style="color: white">codex!</a>
        </div>
      </div>
      <div class="nav-right">
        <a href="radar.html">wx</a>
        <span class="navbar-seperator">//</span>
        <a href="../../web/Contribute/contributespot.html">add</a>
        <span class="navbar-seperator">//</span>
        <a href="about.html">about</a>
      </div>
    </nav>

    <footer id="kovaFooter">
      <p class="kova-corp">kova corp © 2026</p>
      <a class="join-page" href="../../web/Contribute/contribute.html"
        >Contribute</a
      >
    </footer>

    <div id="map"></div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        maptilersdk.config.apiKey = "7TBqy4hTdFfQeIq7oXKj";

        const map = new maptilersdk.Map({
          container: "map",
          style:
            "https://api.maptiler.com/maps/dataviz-dark/style.json?key=7TBqy4hTdFfQeIq7oXKj",
          center: [4.5, 50.85],
          zoom: 7.5,
          minZoom: 5,
          navigationControl: false,
          projectionControl: false,
          geolocateControl: false,
        });

        const firebaseConfig = {
          apiKey: "AIzaSyARxFI9HyJxrINfzDazhxFHKSrGLX8KoBk",
          authDomain: "kova-6052a.firebaseapp.com",
          projectId: "kova-6052a",
          storageBucket: "kova-6052a.firebasestorage.app",
          messagingSenderId: "873689812978",
          appId: "1:873689812978:web:e0581f3df823e51239656b",
          measurementId: "G-VM5224Z3K6",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const footerEl = document.getElementById("kovaFooter");
        const showFooter = () =>
          footerEl && footerEl.classList.remove("footer-hidden");
        const hideFooter = () =>
          footerEl && footerEl.classList.add("footer-hidden");

        let activePopup = null;
        let activeCoordPopup = null;

        // NEW: marker that shows "where user clicked"
        let clickPin = null;

        function updateFooterVisibility() {
          const somethingOpen = !!activePopup || !!activeCoordPopup;
          if (somethingOpen) hideFooter();
          else showFooter();
        }

        function escapeHTML(str) {
          return String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function openNavigation(lat, lng) {
          const isApple = /iPad|iPhone|iPod/.test(navigator.userAgent);
          const isAndroid = /Android/.test(navigator.userAgent);

          const label = "KOVA Spot";
          const q = `${lat},${lng}`;

          if (isAndroid) {
            window.location.href = `geo:${q}?q=${q}(${encodeURIComponent(
              label
            )})`;
            return;
          }

          if (isApple) {
            window.location.href = `https://maps.apple.com/?daddr=${encodeURIComponent(
              q
            )}&dirflg=d`;
            return;
          }

          window.open(
            `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(
              q
            )}`,
            "_blank"
          );
        }

        async function goAddSpot(lat, lng) {
          const coordStr = `${lat.toFixed(5)},${lng.toFixed(5)}`;
          try {
            await navigator.clipboard.writeText(coordStr);
          } catch (e) {}

          const url = `../../web/Contribute/contributespot.html?coords=${encodeURIComponent(
            coordStr
          )}`;
          window.location.href = url;
        }

        if (navigator.geolocation) {
          const userMarkerEl = document.createElement("img");
          userMarkerEl.src = "../../images/playericon.png";
          userMarkerEl.style.width = "28px";
          userMarkerEl.style.height = "28px";
          userMarkerEl.style.transform = "translate(-50%,-50%)";
          userMarkerEl.classList.add("player-marker");

          const userPopupHTML = `<div style="width:150px;text-align:center;font-family:sans-serif;">
            <img src="../../images/playeravatar.png" style="width:100%;height:auto;border-radius:6px;margin-bottom:6px;">
            <strong>This is you</strong><br></div>`;
          const userPopup = new maptilersdk.Popup({ offset: 25 }).setHTML(
            userPopupHTML
          );

          const userMarker = new maptilersdk.Marker({ element: userMarkerEl })
            .setLngLat([0, 0])
            .setPopup(userPopup)
            .addTo(map);

          navigator.geolocation.getCurrentPosition(
            (pos) => {
              userMarker.setLngLat([pos.coords.longitude, pos.coords.latitude]);
              map.setCenter([pos.coords.longitude, pos.coords.latitude]);
            },
            (err) => console.warn("Locatie fout:", err.message),
            { enableHighAccuracy: true }
          );
        }

        function removeClickPin() {
          if (clickPin) {
            clickPin.remove();
            clickPin = null;
          }
        }

        function placeClickPin(lng, lat) {
          if (!clickPin) {
            const pinEl = document.createElement("div");
            pinEl.className = "pinpoint";
            clickPin = new maptilersdk.Marker({ element: pinEl })
              .setLngLat([lng, lat])
              .addTo(map);
          } else {
            clickPin.setLngLat([lng, lat]);
          }
        }

        function closeCoordPopup() {
          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
            updateFooterVisibility();
          }
          // also hide the pin when closing that UI
          removeClickPin();
        }

        function easeToSpotWithPopupSpace(lng, lat) {
          const isMobile = window.matchMedia("(max-width: 700px)").matches;

          if (isMobile) {
            map.easeTo({
              center: [lng, lat],
              zoom: Math.max(map.getZoom(), 12),
              duration: 520,
            });
            return;
          }

          const canvas = map.getCanvas();
          const h = canvas ? canvas.clientHeight : window.innerHeight;
          const liftPx = Math.round(Math.min(220, h * 0.22));

          map.easeTo({
            center: [lng, lat],
            zoom: Math.max(map.getZoom(), 12),
            duration: 520,
            offset: [0, -liftPx],
          });
        }

        // --- Firestore live + marker cache ---
        const markersById = new Map();

        function safeHttpsURL(url) {
          const s = String(url || "");
          return s.startsWith("https://") ? s : "";
        }

        function makeSpotPopupHTML(spot) {
          const name = escapeHTML(spot.name);
          const desc = escapeHTML(spot.description);

          const addedByRaw = spot.addedBy || spot.added_by || spot.author || "";
          const addedBy = escapeHTML(addedByRaw || "unknown");

          const photoURL = safeHttpsURL(spot.photoURL);

          const hero = photoURL
            ? `<div class="hero">
                <div class="badge">spot</div>
                <img src="${photoURL}" alt="${name}" loading="lazy" decoding="async" fetchpriority="low" />
              </div>`
            : `<div class="hero">
                <div class="badge">spot</div>
                <div class="kova-fallback">NO IMAGE</div>
              </div>`;

          return `
            <div class="kova-popup">
              ${hero}
              <div class="body">
                <h3 class="title">${name}</h3>
                <p class="desc">${desc || "No description yet."}</p>
                <p class="byline">added by <b>${addedBy}</b></p>
                <button class="kova-btn primary" data-action="nav" data-lat="${spot.lat}" data-lng="${spot.lng}">
                  Route
                  <span class="sub">open GPS</span>
                </button>
              </div>
            </div>`;
        }

        function removeSpotMarker(id) {
          const item = markersById.get(id);
          if (!item) return;

          item.marker.remove();

          if (activePopup === item.popup) {
            activePopup.remove();
            activePopup = null;
            updateFooterVisibility();
          }

          markersById.delete(id);
        }

        function addSpotMarker(id, spot) {
          const el = document.createElement("div");
          el.className = "spot-marker";
          el.setAttribute("role", "button");
          el.setAttribute("tabindex", "0");

          const popup = new maptilersdk.Popup({
            offset: 18,
            maxWidth: "560px",
            closeButton: true,
            closeOnClick: false,
          }).setHTML(makeSpotPopupHTML(spot));

          const marker = new maptilersdk.Marker({ element: el })
            .setLngLat([spot.lng, spot.lat])
            .addTo(map);

          function openSpot() {
            // if user clicks a spot, hide the "add pin" + coord popup
            removeClickPin();
            closeCoordPopup();

            if (activePopup) activePopup.remove();

            popup.setLngLat([spot.lng, spot.lat]).addTo(map);
            activePopup = popup;
            updateFooterVisibility();

            easeToSpotWithPopupSpace(spot.lng, spot.lat);

            popup.once("close", () => {
              activePopup = null;
              updateFooterVisibility();
            });
          }

          el.addEventListener("click", (e) => {
            e.stopPropagation();
            openSpot();
          });

          el.addEventListener("keydown", (e) => {
            if (e.key === "Enter" || e.key === " ") openSpot();
          });

          markersById.set(id, { marker, popup });
        }

        // --- Event delegation (route + coords actions) ---
        document.addEventListener("click", async (e) => {
          const navBtn = e.target.closest("[data-action='nav']");
          if (navBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(navBtn.getAttribute("data-lat"));
            const lng = Number(navBtn.getAttribute("data-lng"));
            openNavigation(lat, lng);
            return;
          }

          const copyBtn = e.target.closest("[data-action='copy-coords']");
          if (copyBtn) {
            e.preventDefault();
            e.stopPropagation();
            const coords = String(copyBtn.getAttribute("data-coords") || "");
            try {
              await navigator.clipboard.writeText(coords);
              copyBtn.innerText = "Copied!";
              setTimeout(() => (copyBtn.innerText = "Copy"), 900);
            } catch (err) {}
            return;
          }

          const addBtn = e.target.closest("[data-action='add-spot']");
          if (addBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(addBtn.getAttribute("data-lat"));
            const lng = Number(addBtn.getAttribute("data-lng"));
            await goAddSpot(lat, lng);
            return;
          }
        });

        // --- Firestore live listener ---
        db.collection("spots").onSnapshot(
          (snapshot) => {
            snapshot.docChanges().forEach((change) => {
              const id = change.doc.id;
              const spot = change.doc.data();

              if (change.type === "added") {
                if (!markersById.has(id)) addSpotMarker(id, spot);
              } else if (change.type === "removed") {
                removeSpotMarker(id);
              } else if (change.type === "modified") {
                removeSpotMarker(id);
                addSpotMarker(id, spot);
              }
            });
          },
          (err) => console.error(err)
        );

        // --- MAP CLICK COORDS ---
        map.on("click", (event) => {
          const t = event.originalEvent && event.originalEvent.target;
          if (t && (t.closest(".spot-marker") || t.closest(".player-marker"))) {
            return;
          }

          if (activePopup) {
            activePopup.remove();
            activePopup = null;
          }

          // close old coord popup but keep pin handling below
          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
          }

          const { lng, lat } = event.lngLat;
          const coordStr = `${lat.toFixed(5)},${lng.toFixed(5)}`;

          // NEW: show pin at clicked location
          placeClickPin(lng, lat);

          const popupHTML = `
            <div class="coord-popup">
              <strong>Coordinates</strong>
              <span class="coords">Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(
            5
          )}</span>
              <div class="btn-row">
                <button data-action="copy-coords" data-coords="${coordStr}">Copy</button>
                <button class="primary" data-action="add-spot" data-lat="${lat}" data-lng="${lng}">Add spot</button>
              </div>
            </div>
          `;

          activeCoordPopup = new maptilersdk.Popup({
            offset: 18,
            closeButton: true,
            closeOnClick: false,
            maxWidth: "280px",
          })
            .setLngLat([lng, lat])
            .setHTML(popupHTML)
            .addTo(map);

          updateFooterVisibility();

          activeCoordPopup.once("close", () => {
            activeCoordPopup = null;
            removeClickPin(); // NEW: hide pin if user closes popup
            updateFooterVisibility();
          });
        });

        function closeAll() {
          if (activePopup) {
            activePopup.remove();
            activePopup = null;
          }
          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
          }
          removeClickPin(); // NEW
          updateFooterVisibility();
        }

        map.on("dragstart", closeAll);
        map.on("zoomstart", closeAll);

        updateFooterVisibility();
      });
    </script>
  </body>
</html>
