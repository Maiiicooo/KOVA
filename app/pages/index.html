    <style>

        --bg: transparent;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b7108;

      body {
        margin: 0;
        padding: 0;

        background: #161515;
        color: var(--fg);

        overflow: hidden;
      }

      nav {
        width: 100%;
        padding: 22px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        background: var(--bg);
        z-index: 20;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-left img {
        height: 50px;
        width: auto;
      }

      .beta {
        padding: 2px;
        font-size: 0.85rem;
        background-color: var(--accent);
        color: white;
        letter-spacing: 0.5px;
      }

      .nav-right a {
        margin-left: 32px;
        text-decoration: none;
        color: var(--fg);
        font-size: 0.95rem;
        opacity: 0.8;
        transition: opacity 0.25s, color 0.25s;
      }

      .nav-right a:hover {
        opacity: 1;
        color: var(--accent);
      }

      .navbar-seperator {
        margin-left: 20px;
      }

      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        z-index: 0;
      }

      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }

      .pinpoint {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        border: 3px solid var(--accent);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.55);
        transform: translate(-50%, -50%);
        position: relative;
        pointer-events: none;
      }

      .pinpoint::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: #111;
        opacity: 0.9;
      }

      .maplibregl-popup-content {
        background: transparent !important;
        padding: 0 !important;
        box-shadow: none !important;
      }

      .maplibregl-popup-tip {
        display: none !important;
      }

      .maplibregl-popup-close-button {
        color: rgba(255, 255, 255, 0.7) !important;
        background: transparent !important;
        font-size: 18px;
        padding: 10px 12px !important;
      }

      footer {
        transition: opacity 0.18s ease, transform 0.18s ease;
      }

      footer.footer-hidden {
        opacity: 0;
        transform: translateY(8px);
        pointer-events: none;
      }

      .join-page {
        color: var(--fg);
        position: absolute;
        bottom: 0%;
        right: 0%;
        padding-bottom: 17px;
        padding-right: 15px;
        z-index: 30;
      }

      .kova-corp {
        position: absolute;
        bottom: 0%;
        padding-left: 15px;
        z-index: 30;
      }

      .kova-popup {
        width: min(520px, calc(100vw - 28px));
        background: linear-gradient(180deg, var(--panel), rgba(0, 0, 0, 0.92));
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .kova-popup .hero {
        position: relative;
        height: 240px;
        background: #111;
        overflow: hidden;
      }

      .kova-popup .hero img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: saturate(1.05) contrast(1.05);
        transform: scale(1.01);
      }

      .kova-popup .hero::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0.25) 55%,
          rgba(0, 0, 0, 0.75) 100%

        pointer-events: none;
      }

      .kova-popup .badge {
        position: absolute;
        left: 14px;
        top: 14px;
        padding: 7px 10px;
        font-size: 0.78rem;

      .kova-popup .desc {

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        maptilersdk.config.apiKey = "7TBqy4hTdFfQeIq7oXKj";

        const map = new maptilersdk.Map({
          container: "map",
          style:
            "https://api.maptiler.com/maps/dataviz-dark/style.json?key=7TBqy4hTdFfQeIq7oXKj",
          center: [4.5, 50.85],
          zoom: 7.5,
          minZoom: 5,
          navigationControl: false,
          projectionControl: false,
          geolocateControl: false,
          doubleClickZoom: false,
        });

        if (map.doubleClickZoom) {
          map.doubleClickZoom.disable();
        }

        map.on("dblclick", (e) => {
          e.preventDefault();
        });

        const firebaseConfig = {
          apiKey: "AIzaSyARxFI9HyJxrINfzDazhxFHKSrGLX8KoBk",
          authDomain: "kova-6052a.firebaseapp.com",
          projectId: "kova-6052a",
          storageBucket: "kova-6052a.firebasestorage.app",
          messagingSenderId: "873689812978",
          appId: "1:873689812978:web:e0581f3df823e51239656b",
          measurementId: "G-VM5224Z3K6",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const footerEl = document.getElementById("kovaFooter");
        const showFooter = () =>
          footerEl && footerEl.classList.remove("footer-hidden");
        const hideFooter = () =>
          footerEl && footerEl.classList.add("footer-hidden");

        let activePopup = null;
        let activeCoordPopup = null;
        let clickPin = null;
        let userMarker = null;
        let userPopup = null;
        let userMarkerEl = null;

        const SOURCE_ID = "spots";
        const LAYER_CLUSTERS = "spots-clusters";
        const LAYER_CLUSTER_COUNT = "spots-cluster-count";
        const LAYER_POINTS = "spots-points";

        function updateFooterVisibility() {
          const somethingOpen =
            !!activePopup || !!activeCoordPopup || !!(userPopup && userPopup.isOpen());
          if (somethingOpen) hideFooter();
          else showFooter();
        }

        function escapeHTML(str) {
          return String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function safeHttpsURL(url) {
          const s = String(url || "");
          return s.startsWith("https://") ? s : "";
        }

        function openNavigation(lat, lng) {
          const isApple = /iPad|iPhone|iPod/.test(navigator.userAgent);
          const isAndroid = /Android/.test(navigator.userAgent);
          const q = `${lat},${lng}`;
          const label = "KOVA Spot";

          if (isAndroid) {
            window.location.href = `geo:${q}?q=${q}(${encodeURIComponent(label)})`;
            return;
          }

          if (isApple) {
            window.location.href = `https://maps.apple.com/?daddr=${encodeURIComponent(
              q
            )}&dirflg=d`;
            return;
          }

          window.open(
            `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(
              q
            )}`,
            "_blank"
          );
        }

        async function goAddSpot(lat, lng) {
          const coordStr = `${lat.toFixed(5)},${lng.toFixed(5)}`;
          try {
            await navigator.clipboard.writeText(coordStr);
          } catch (e) {}

          const url = `../../web/Contribute/contributespot.html?coords=${encodeURIComponent(
            coordStr
          )}`;
          window.location.href = url;
        }

        function removeClickPin() {
          if (clickPin) {
            clickPin.remove();
            clickPin = null;
          }
        }

        function placeClickPin(lng, lat) {
          if (!clickPin) {
            const pinEl = document.createElement("div");
            pinEl.className = "pinpoint";
            clickPin = new maptilersdk.Marker({ element: pinEl })
              .setLngLat([lng, lat])
              .addTo(map);
          } else {
            clickPin.setLngLat([lng, lat]);
          }
        }

        function closeCoordPopup() {
          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
            updateFooterVisibility();
          }
          removeClickPin();
        }

        function closeUserPopup() {
          if (userPopup && userPopup.isOpen()) {
            userPopup.remove();
          }
          updateFooterVisibility();
        }

        function closeAll() {
          if (activePopup) {
            activePopup.remove();
            activePopup = null;
          }

          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
          }

          closeUserPopup();
          removeClickPin();
          updateFooterVisibility();
        }

        function easeToSpotWithPopupSpace(lng, lat) {
          const isMobile = window.matchMedia("(max-width: 700px)").matches;

          if (isMobile) {
            map.easeTo({
              center: [lng, lat],
              zoom: Math.max(map.getZoom(), 12),
              duration: 520,
            });
            return;
          }

          const canvas = map.getCanvas();
          const h = canvas ? canvas.clientHeight : window.innerHeight;
          const liftPx = Math.round(Math.min(220, h * 0.22));

          map.easeTo({
            center: [lng, lat],
            zoom: Math.max(map.getZoom(), 12),
            duration: 520,
            offset: [0, -liftPx],
          });
        }

        function makeSpotPopupHTML(props) {
          const name = escapeHTML(props.name);
          const desc = escapeHTML(props.description);
          const addedByRaw =
            props.addedBy || props.added_by || props.author || "";
          const addedBy = escapeHTML(addedByRaw || "unknown");
          const photoURL = safeHttpsURL(props.photoURL);

          const hero = photoURL
            ? `<div class="hero">
                <div class="badge">spot</div>
                <img src="${photoURL}" alt="${name}" loading="lazy" decoding="async" fetchpriority="low" />
              </div>`
            : `<div class="hero">
                <div class="badge">spot</div>
                <div class="kova-fallback">NO IMAGE</div>
              </div>`;

          return `
            <div class="kova-popup">
              ${hero}
              <div class="body">
                <h3 class="title">${name}</h3>
                <p class="desc">${desc || "No description yet."}</p>
                <p class="byline">added by <b>${addedBy}</b></p>
                <button class="kova-btn primary" data-action="nav" data-lat="${props.lat}" data-lng="${props.lng}">
                  Route
                  <span class="sub">open GPS</span>
                </button>
              </div>
            </div>
          `;
        }

        function emptyGeoJSON() {
          return { type: "FeatureCollection", features: [] };
        }

        function setSpotsGeoJSON(features) {
          const src = map.getSource(SOURCE_ID);
          if (!src) return;
          src.setData({
            type: "FeatureCollection",
            features,
          });
        }

        let lastFetchToken = 0;
        let fetchTimer = null;

        function toRad(x) {
          return (x * Math.PI) / 180;
        }

        function haversineMeters(aLat, aLng, bLat, bLng) {
          const R = 6371000;
          const dLat = toRad(bLat - aLat);
          const dLng = toRad(bLng - aLng);

          const s1 =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(aLat)) *
              Math.cos(toRad(bLat)) *
              Math.sin(dLng / 2) *
              Math.sin(dLng / 2);

          const c = 2 * Math.atan2(Math.sqrt(s1), Math.sqrt(1 - s1));
          return R * c;
        }

        async function fetchSpotsForCurrentView() {
          const token = ++lastFetchToken;

          const b = map.getBounds();
          const sw = b.getSouthWest();
          const ne = b.getNorthEast();
          const center = map.getCenter();

          const radiusM = haversineMeters(
            center.lat,
            center.lng,
            ne.lat,
            ne.lng
          );

          const canGeoHash =
            window.geofire &&
            typeof window.geofire.geohashQueryBounds === "function";

          const docsById = new Map();

          try {
            if (canGeoHash) {
              const bounds = window.geofire.geohashQueryBounds(
                [center.lat, center.lng],
                radiusM
              );

              await Promise.all(
                bounds.map(async (bound) => {
                  const q = db
                    .collection("spots")
                    .orderBy("geohash")
                    .startAt(bound[0])
                    .endAt(bound[1]);

                  const snap = await q.get();
                  snap.forEach((doc) => {
                    docsById.set(doc.id, doc.data());
                  });
                })
              );
            } else {
              const q = db
                .collection("spots")
                .where("lat", ">=", sw.lat)
                .where("lat", "<=", ne.lat);

              const snap = await q.get();
              snap.forEach((doc) => {
                const d = doc.data();
                if (
                  d &&
                  typeof d.lng === "number" &&
                  d.lng >= sw.lng &&
                  d.lng <= ne.lng
                ) {
                  docsById.set(doc.id, d);
                }
              });
            }
          } catch (err) {
            console.error("Spot fetch error:", err);
            return;
          }

          if (token !== lastFetchToken) return;

          const features = [];

          docsById.forEach((spot, id) => {
            if (
              !spot ||
              typeof spot.lat !== "number" ||
              typeof spot.lng !== "number"
            ) {
              return;
            }

            if (
              spot.lat < sw.lat ||
              spot.lat > ne.lat ||
              spot.lng < sw.lng ||
              spot.lng > ne.lng
            ) {
              return;
            }

            features.push({
              type: "Feature",
              geometry: {
                type: "Point",
                coordinates: [spot.lng, spot.lat],
              },
              properties: {
                id,
                name: spot.name || "",
                description: spot.description || "",
                addedBy: spot.addedBy || "",
                added_by: spot.added_by || "",
                author: spot.author || "",
                photoURL: spot.photoURL || "",
                lat: spot.lat,
                lng: spot.lng,
              },
            });
          });

          setSpotsGeoJSON(features);
        }

        function scheduleFetch() {
          if (fetchTimer) clearTimeout(fetchTimer);
          fetchTimer = setTimeout(fetchSpotsForCurrentView, 140);
        }

        async function zoomToClusterSpots(clusterId, fallbackCoords) {
          const src = map.getSource(SOURCE_ID);
          if (!src) return;

          try {
            const leaves = await src.getClusterLeaves(Number(clusterId), 100, 0);

            if (Array.isArray(leaves) && leaves.length > 1) {
              const bounds = new maptilersdk.LngLatBounds();

              leaves.forEach((leaf) => {
                const coords = leaf?.geometry?.coordinates;
                if (
                  Array.isArray(coords) &&
                  typeof coords[0] === "number" &&
                  typeof coords[1] === "number"
                ) {
                  bounds.extend(coords);
                }
              });

              if (!bounds.isEmpty()) {
                map.fitBounds(bounds, {
                  padding: { top: 90, bottom: 90, left: 90, right: 90 },
                  maxZoom: 15,
                  duration: 650,
                });
                return;
              }
            }

            if (Array.isArray(leaves) && leaves.length === 1) {
              const onlyCoords = leaves[0]?.geometry?.coordinates;
              if (Array.isArray(onlyCoords)) {
                map.easeTo({
                  center: onlyCoords,
                  zoom: Math.max(map.getZoom(), 14),
                  duration: 520,
                });
                return;
              }
            }

            const zoom = await src.getClusterExpansionZoom(Number(clusterId));
            map.easeTo({
              center: fallbackCoords,
              zoom,
              duration: 520,
            });
          } catch (err) {
            console.error("Cluster zoom error:", err);

            try {
              const zoom = await src.getClusterExpansionZoom(Number(clusterId));
              map.easeTo({
                center: fallbackCoords,
                zoom,
                duration: 520,
              });
            } catch (fallbackErr) {
              console.error("Cluster fallback zoom error:", fallbackErr);
            }
          }
        }

        if (navigator.geolocation) {
          userMarkerEl = document.createElement("img");
          userMarkerEl.src = "../../images/playericon.png";
          userMarkerEl.style.width = "28px";
          userMarkerEl.style.height = "28px";
          userMarkerEl.classList.add("player-marker");

          const userPopupHTML = `
            <div class="user-popup-card">
              <img src="../../images/playeravatar.png" alt="Player avatar">
              <div class="body">
                <strong>This is you</strong>
              </div>
            </div>
          `;

          userPopup = new maptilersdk.Popup({
            offset: 25,
            closeButton: true,
            closeOnClick: false,
            className: "user-map-popup",
            maxWidth: "200px",
          }).setHTML(userPopupHTML);

          userMarker = new maptilersdk.Marker({
            element: userMarkerEl,
            anchor: "center",
          })
            .setLngLat([0, 0])
            .setPopup(userPopup)
            .addTo(map);

          userMarkerEl.addEventListener("click", (ev) => {
            ev.preventDefault();
            ev.stopPropagation();
            closeCoordPopup();

            if (activePopup) {
              activePopup.remove();
              activePopup = null;
            }

            if (userPopup.isOpen()) {
              userPopup.remove();
            } else {
              userMarker.togglePopup();
            }

            updateFooterVisibility();
          });

          userPopup.on("open", updateFooterVisibility);
          userPopup.on("close", updateFooterVisibility);

          navigator.geolocation.getCurrentPosition(
            (pos) => {
              userMarker.setLngLat([pos.coords.longitude, pos.coords.latitude]);
              map.setCenter([pos.coords.longitude, pos.coords.latitude]);
              scheduleFetch();
            },
            (err) => console.warn("Locatie fout:", err.message),
            { enableHighAccuracy: true }
          );
        }

        document.addEventListener("click", async (e) => {
          const navBtn = e.target.closest("[data-action='nav']");
          if (navBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(navBtn.getAttribute("data-lat"));
            const lng = Number(navBtn.getAttribute("data-lng"));
            openNavigation(lat, lng);
            return;
          }

          const copyBtn = e.target.closest("[data-action='copy-coords']");
          if (copyBtn) {
            e.preventDefault();
            e.stopPropagation();
            const coords = String(copyBtn.getAttribute("data-coords") || "");
            try {
              await navigator.clipboard.writeText(coords);
              copyBtn.innerText = "Copied!";
              setTimeout(() => {
                copyBtn.innerText = "Copy";
              }, 900);
            } catch (err) {}
            return;
          }

          const addBtn = e.target.closest("[data-action='add-spot']");
          if (addBtn) {
            e.preventDefault();
            e.stopPropagation();
            const lat = Number(addBtn.getAttribute("data-lat"));
            const lng = Number(addBtn.getAttribute("data-lng"));
            await goAddSpot(lat, lng);
          }
        });

        map.on("load", () => {
          map.addSource(SOURCE_ID, {
            type: "geojson",
            data: emptyGeoJSON(),
            cluster: true,
            clusterMaxZoom: 13,
            clusterRadius: 55,
          });

          map.addLayer({
            id: LAYER_CLUSTERS,
            type: "circle",
            source: SOURCE_ID,
            filter: ["has", "point_count"],
            paint: {
              "circle-color": "rgba(139, 113, 8, 0.95)",
              "circle-stroke-color": "rgba(0,0,0,0.85)",
              "circle-stroke-width": 2,
              "circle-radius": ["step", ["get", "point_count"], 18, 25, 22, 75, 26, 200, 32],
              "circle-opacity": 0.95,
            },
          });

          map.addLayer({
            id: LAYER_CLUSTER_COUNT,
            type: "symbol",
            source: SOURCE_ID,
            filter: ["has", "point_count"],
            layout: {
              "text-field": "{point_count_abbreviated}",
              "text-font": ["Open Sans Bold"],
              "text-size": 12,
            },
            paint: {
              "text-color": "#0b0b0b",
            },
          });

          map.addLayer({
            id: LAYER_POINTS,
            type: "circle",
            source: SOURCE_ID,
            filter: ["!", ["has", "point_count"]],
            paint: {
              "circle-color": "rgba(139, 113, 8, 1)",
              "circle-stroke-color": "rgba(0,0,0,0.9)",
              "circle-stroke-width": 2,
              "circle-radius": 8,
            },
          });

          map.on("mouseenter", LAYER_POINTS, () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", LAYER_POINTS, () => {
            map.getCanvas().style.cursor = "";
          });

          map.on("mouseenter", LAYER_CLUSTERS, () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", LAYER_CLUSTERS, () => {
            map.getCanvas().style.cursor = "";
          });

          map.on("click", LAYER_CLUSTERS, async (e) => {
            const feature = e.features?.[0];
            if (!feature) return;

            const clusterId = Number(feature.properties?.cluster_id);
            if (!Number.isFinite(clusterId)) return;

            closeCoordPopup();
            closeUserPopup();

            if (activePopup) {
              activePopup.remove();
              activePopup = null;
            }

            const coords = feature.geometry.coordinates;
            await zoomToClusterSpots(clusterId, coords);
          });

          map.on("click", LAYER_POINTS, (e) => {
            const f = e.features?.[0];
            if (!f) return;

            closeCoordPopup();
            closeUserPopup();

            if (activePopup) {
              activePopup.remove();
            }

            const coords = f.geometry.coordinates;
            const props = { ...(f.properties || {}) };

            props.lat = Number(props.lat);
            props.lng = Number(props.lng);

            const popup = new maptilersdk.Popup({
              offset: 18,
              maxWidth: "560px",
              closeButton: true,
              closeOnClick: false,
              className: "spot-sheet-popup",
            })
              .setLngLat(coords)
              .setHTML(makeSpotPopupHTML(props))
              .addTo(map);

            activePopup = popup;
            updateFooterVisibility();

            easeToSpotWithPopupSpace(coords[0], coords[1]);

            popup.once("close", () => {
              activePopup = null;
              updateFooterVisibility();
            });
          });

          fetchSpotsForCurrentView();
        });

        map.on("moveend", scheduleFetch);
        map.on("zoomend", scheduleFetch);
        map.on("dragstart", closeAll);

        map.on("click", (event) => {
          const target = event.originalEvent?.target;

          if (
            target &&
            (target.closest(".player-marker") ||
              target.closest(".user-popup-card") ||
              target.closest(".user-map-popup") ||
              target.closest(".maplibregl-popup"))
          ) {
            return;
          }

          const hits = map.queryRenderedFeatures(event.point, {
            layers: [LAYER_CLUSTERS, LAYER_POINTS],
          });

          if (hits && hits.length) return;

          closeUserPopup();

          if (activePopup) {
            activePopup.remove();
            activePopup = null;
          }

          if (activeCoordPopup) {
            activeCoordPopup.remove();
            activeCoordPopup = null;
          }

          const { lng, lat } = event.lngLat;
          const coordStr = `${lat.toFixed(5)},${lng.toFixed(5)}`;

          placeClickPin(lng, lat);

          const popupHTML = `
            <div class="coord-popup">
              <strong>Coordinates</strong>
              <span class="coords">Lat: ${lat.toFixed(5)}<br>Lng: ${lng.toFixed(5)}</span>
              <div class="btn-row">
                <button data-action="copy-coords" data-coords="${coordStr}">Copy</button>
                <button class="primary" data-action="add-spot" data-lat="${lat}" data-lng="${lng}">Add spot</button>
              </div>
            </div>
          `;

          activeCoordPopup = new maptilersdk.Popup({
            offset: 18,
            closeButton: true,
            closeOnClick: false,
            maxWidth: "280px",
            className: "coord-map-popup",
          })
            .setLngLat([lng, lat])
            .setHTML(popupHTML)
            .addTo(map);

          updateFooterVisibility();

          activeCoordPopup.once("close", () => {
            activeCoordPopup = null;
            removeClickPin();
            updateFooterVisibility();
          });
        });

        updateFooterVisibility();
      });
    </script>
  </body>
</html>
