<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KOVA - wx</title>

    <link rel="manifest" href="../../manifest.json" />
    <meta name="theme-color" content="#000000" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="apple-touch-icon" href="../../images/appicon.JPG" />

    <!-- MapTiler SDK + Weather plugin -->
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.2.0/maptiler-sdk.css"
      rel="stylesheet"
    />
    <script src="https://cdn.maptiler.com/maptiler-weather/v3.0.1/maptiler-weather.umd.min.js"></script>

    <style>
      :root {
        --bg: transparent;
        --fg: #fff;
        --muted: rgba(255, 255, 255, 0.6);
        --line: rgba(255, 255, 255, 0.12);
        --accent: #8b7108;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          sans-serif;
        background: #161515;
        color: var(--fg);
        height: 100vh;
        overflow: hidden;
      }

      /* NAVBAR (zelfde als index) ---------------------------------- */
      nav {
        width: 100%;
        padding: 22px 34px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        background: var(--bg);
        z-index: 20;
      }

      .nav-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .nav-left img {
        height: 50px;
        width: auto;
      }

      .beta {
        padding: 2px;
        font-size: 0.85rem;
        background-color: var(--accent);
        color: white;
        letter-spacing: 0.5px;
      }

      .nav-right a {
        margin-left: 32px;
        text-decoration: none;
        color: var(--fg);
        font-size: 0.95rem;
        opacity: 0.8;
        transition: opacity 0.25s, color 0.25s;
      }

      .nav-right a:hover {
        opacity: 1;
        color: var(--accent);
      }

      .navbar-seperator {
        margin-left: 20px;
      }

      /* MAP -------------------------------------------------------- */
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
        z-index: 0;
        background: #444952;
      }

      /* HUD (tijd + mode) ----------------------------------------- */
      .hud {
        position: fixed;
        top: 86px; /* onder navbar */
        left: 16px;
        z-index: 30;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .hud-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .hud-chip {
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid var(--line);
        padding: 8px 10px;
        color: white;
        text-shadow: 0 0 6px black;
        font-size: 12px;
        line-height: 1;
        backdrop-filter: blur(6px);
      }

      .hud-btn {
        background: rgba(0, 0, 0, 0.45);
        border: 1px solid var(--line);
        padding: 8px 10px;
        color: white;
        cursor: pointer;
        font-size: 12px;
        line-height: 1;
        transition: color 0.25s, border-color 0.25s;
        user-select: none;
      }

      .hud-btn:hover {
        color: var(--accent);
        border-color: rgba(139, 113, 8, 0.6);
      }

      /* hide maptiler watermark */
      .maplibregl-control-container,
      .maplibregl-ctrl-bottom-left,
      .maplibregl-ctrl-logo,
      .maplibregl-ctrl-attrib,
      .maptiler-attribution {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }

      @media (max-width: 600px) {
        nav {
          padding: 16px 18px;
        }
        .nav-left img {
          height: 40px;
        }
        .beta {
          font-size: 0.7rem;
          padding: 2px 5px;
        }
        .nav-right a {
          margin-left: 0;
          font-size: 0.85rem;
        }
        .navbar-seperator {
          margin-left: 0;
          opacity: 0.5;
        }

        .hud {
          top: 74px;
          left: 12px;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <nav>
      <div class="nav-left">
        <a href="../../index.html">
          <img src="../../images/kogaskeer.png" alt="Kova logo small" />
        </a>
        <div class="beta">
          <a href="../../app/pages/tutorial.html" style="color: white"
            >codex!</a
          >
        </div>
      </div>
      <div class="nav-right">
        <a href="../../app/pages/index.html">nv</a>
        <span class="navbar-seperator">//</span>
        <a href="../../web/Contribute/contributespot.html">add</a>
        <span class="navbar-seperator">//</span>
        <a href="about.html">about</a>
      </div>
    </nav>

    <!-- HUD -->
    <div class="hud">
      <div class="hud-row">
        <div class="hud-chip" id="time-text">Loading…</div>
      </div>
      <div class="hud-row">
        <div class="hud-btn" id="fourHButton" title="Forecast mode (fast time)">
          ▶︎ Play
        </div>
        <div class="hud-btn" id="ctButton" title="Live mode (real time)">
          ◼ Stop
        </div>
      </div>
    </div>

    <!-- MAP -->
    <div id="map"></div>

    <script>
      maptilersdk.config.apiKey = "7TBqy4hTdFfQeIq7oXKj";

      const map = new maptilersdk.Map({
        container: "map",
        style:
          "https://api.maptiler.com/maps/dataviz-dark/style.json?key=7TBqy4hTdFfQeIq7oXKj",
        zoom: 7.5,
        center: [4.5, 50.85],
        projection: "mercator",
        antialias: false,
        fadeDuration: 0,
        hash: false,
        minZoom: 5,
        maxZoom: 10,
        projectionControl: false,
        navigationControl: false,
        geolocateControl: false,
      });

      // GEOLOCATIE (zelfde player popup vibe)
      if (navigator.geolocation) {
        const userMarkerEl = document.createElement("img");
        userMarkerEl.src = "../../images/playericon.png";
        userMarkerEl.style.width = "28px";
        userMarkerEl.style.height = "28px";
        userMarkerEl.style.transform = "translate(-50%, -50%)";

        const userPopupHTML = `
          <div style="width:150px; text-align:center; font-family:sans-serif;">
            <img src="../../images/playeravatar.png" style="width:100%; height:auto; border-radius:6px; margin-bottom:6px;">
            <strong>This is you</strong><br>
          </div>
        `;
        const userPopup = new maptilersdk.Popup({ offset: 25 }).setHTML(
          userPopupHTML
        );

        const userMarker = new maptilersdk.Marker({ element: userMarkerEl })
          .setLngLat([0, 0])
          .setPopup(userPopup)
          .addTo(map);

        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lng = position.coords.longitude;
            const lat = position.coords.latitude;
            userMarker.setLngLat([lng, lat]);
            map.setCenter([lng, lat]);
          },
          (err) => console.warn("Location error:", err.message),
          { enableHighAccuracy: true }
        );
      }

      // Layers
      const radarLayer = new maptilerweather.RadarLayer({ opacity: 0.7 });
      // const windLayer = new maptilerweather.WindLayer({ opacity: 0.5 });

      let liveTimer;
      let isForecasting = false;

      function fmt(d) {
        return d.toLocaleString("nl-BE", {
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
      }

      // Live clock + set layer animation time
      function tickLive() {
        const now = new Date();
        document.getElementById("time-text").innerText = fmt(now);
        const unixTs = Math.floor(now.getTime() / 1000);
        radarLayer.setAnimationTime(unixTs);
        // windLayer.setAnimationTime(unixTs);
      }

      // Forecast clock (based on radar animation time)
      function tickForecast() {
        const dRadar = radarLayer.getAnimationTimeDate();
        document.getElementById("time-text").innerText = fmt(dRadar);
        // const ts = radarLayer.getAnimationTime();
        // windLayer.setAnimationTime(ts);
      }

      function startLive() {
        isForecasting = false;
        radarLayer.animateByFactor(0);
        // windLayer.animateByFactor(0);

        clearInterval(liveTimer);
        radarLayer.off("tick", tickForecast);
        radarLayer.off("tick", tickLive);
        radarLayer.on("tick", tickLive);

        tickLive();
        liveTimer = setInterval(tickLive, 1000);
      }

      function startForecast() {
        isForecasting = true;
        clearInterval(liveTimer);

        radarLayer.off("tick", tickLive);
        radarLayer.on("tick", tickForecast);

        radarLayer.animateByFactor(3600); // 1s = 1h
        // windLayer.animateByFactor(3600);
      }

      map.on("load", () => {
        map.addLayer(radarLayer);
        // map.addLayer(windLayer);
        startLive();
      });

      document.getElementById("fourHButton").addEventListener("click", (e) => {
        e.preventDefault();
        if (!isForecasting) startForecast();
      });

      document.getElementById("ctButton").addEventListener("click", (e) => {
        e.preventDefault();
        if (isForecasting) startLive();
      });
    </script>
  </body>
</html>
